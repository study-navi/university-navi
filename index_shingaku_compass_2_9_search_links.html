<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>進学コンパス2.9｜検索・公式リンク強化版</title>
<meta name="theme-color" content="#143b73">
<style>

:root{
  --navy:#143b73;--blue:#2563eb;--bg:#f4f8fd;--line:#dbe7f6;--muted:#64748b;
  --gold:#fff4c7;--goldText:#795200;--green:#16a34a;
}
*{box-sizing:border-box}
html,body{margin:0;padding:0;font-family:-apple-system,BlinkMacSystemFont,"Hiragino Sans","Yu Gothic",Meiryo,sans-serif;background:var(--bg);color:#0f172a}
header{background:linear-gradient(135deg,#123a73,#2563eb);color:white;padding:18px 16px 22px;text-align:center}
header h1{margin:5px 0 2px;font-size:25px;letter-spacing:.04em}
header p{margin:0;color:#eaf3ff;font-size:13px;font-weight:800}
main{max-width:1080px;margin:0 auto;padding:14px}
.card{background:white;border:1px solid var(--line);border-radius:24px;padding:18px;box-shadow:0 10px 28px rgba(20,59,115,.07);margin:12px 0}
.fixedHome,.fixedMenu{
  position:fixed;top:12px;z-index:10020;border:0;border-radius:999px;background:white;color:var(--navy);
  padding:10px 14px;font-weight:900;font-size:14px;box-shadow:0 10px 24px rgba(15,23,42,.18);cursor:pointer
}
.fixedHome{left:14px}.fixedMenu{right:14px}
.menuOverlay{display:none;position:fixed;inset:0;z-index:10030;background:rgba(15,23,42,.12)}
.menuOverlay.open{display:block}
.menuPanel{position:fixed;right:18px;top:64px;width:min(350px,calc(100vw - 36px));background:white;border:1px solid var(--line);border-radius:24px;padding:18px;box-shadow:0 22px 48px rgba(15,23,42,.22)}
.menuClose{float:right;border:0;border-radius:999px;padding:8px 11px;background:#eef6ff;color:var(--navy);font-weight:900}
.menuBtn{display:block;width:100%;border:0;background:white;color:var(--navy);text-align:left;font-size:15px;font-weight:900;padding:11px 8px;border-radius:14px;cursor:pointer}
.menuBtn:hover{background:#eef6ff}
.hero{background:linear-gradient(135deg,#0f2f5f,#143b73 55%,#2563eb);color:white;border-radius:28px;padding:22px 18px;box-shadow:0 18px 42px rgba(15,47,95,.23)}
.student .hero{background:linear-gradient(135deg,#166534,#16a34a 55%,#22c55e)}
.parent .hero{background:linear-gradient(135deg,#795200,#b7791f 55%,#f59e0b)}
.hero h2{font-size:29px;margin:0 0 6px;color:white}.hero .copy{font-size:15px;font-weight:900;color:white;margin:0 0 10px}
.badge{display:inline-block;background:var(--gold);color:var(--goldText);border:1px solid #ffd166;border-radius:999px;padding:8px 12px;font-size:12px;font-weight:900;cursor:pointer}
.searchBox{display:flex;gap:8px;margin-top:14px;background:white;border-radius:18px;padding:8px}
.searchBox input{flex:1;border:0;outline:0;padding:10px;font-size:14px;min-width:0}
.searchBox button,.btn{border:0;border-radius:999px;background:var(--navy);color:white;font-weight:900;padding:10px 14px;cursor:pointer;font-size:13px}
.btn.gray{background:#eef6ff;color:var(--navy)}.btn.green{background:#ecfdf3;color:#087443;border:1px solid #abe7c3}.btn.gold{background:#fff5d7;color:#795200;border:1px solid #ffd166}
.grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin:14px 0}@media(min-width:760px){.grid{grid-template-columns:repeat(3,1fr)}}
.navCard{background:white;border:1px solid var(--line);border-radius:22px;padding:16px 12px;cursor:pointer;box-shadow:0 8px 22px rgba(20,59,115,.07);text-align:left}
.navCard:hover{border-color:var(--blue);background:#f8fbff}.navCard.wide{grid-column:1/-1}@media(min-width:760px){.navCard.wide{grid-column:auto}}
.navIcon{font-size:29px;margin-bottom:5px}.navCard h3{margin:0 0 5px;color:var(--navy);font-size:16px}.navCard p{margin:0;color:var(--muted);font-size:12px;line-height:1.55;font-weight:700}
.modeHero{background:linear-gradient(135deg,#0f2f5f,#143b73 55%,#2563eb);color:white;border-radius:28px;padding:26px 18px;text-align:center;box-shadow:0 18px 42px rgba(15,47,95,.23)}
.modeHero h2{font-size:29px;margin:0 0 8px;color:white}.modeHero p{margin:0;color:#eaf3ff;font-weight:900}
.modeGrid{display:grid;grid-template-columns:1fr;gap:12px;margin:18px 0}@media(min-width:760px){.modeGrid{grid-template-columns:repeat(3,1fr)}}
.modeCard{background:white;border:1px solid var(--line);border-radius:24px;padding:20px 16px;cursor:pointer;box-shadow:0 10px 26px rgba(20,59,115,.08);text-align:left}
.modeCard:hover{border-color:#2563eb;background:#f8fbff}.modeIcon{font-size:38px;margin-bottom:8px}.modeCard h3{margin:0 0 6px;color:var(--navy);font-size:18px}.modeCard p{margin:0;color:var(--muted);font-size:13px;line-height:1.6;font-weight:800}
.modePill,.pill{display:inline-block;border-radius:999px;padding:6px 10px;margin:4px 4px 0 0;font-size:12px;font-weight:900;background:#eef6ff;color:var(--navy)}
.modeBar{display:flex;justify-content:space-between;align-items:center;gap:8px;background:#fbfdff;border:1px solid var(--line);border-radius:18px;padding:10px 12px;margin:10px 0 12px}.modeBar strong{color:var(--navy);font-size:13px}
h2,h3{color:var(--navy)} h2{margin:0 0 10px}
label{display:block;font-size:13px;font-weight:900;color:var(--navy);margin:10px 0 5px}
input,select,textarea{width:100%;border:1px solid var(--line);border-radius:14px;padding:11px;font-size:16px;background:white}
.actions{display:grid;grid-template-columns:1fr;gap:8px;margin-top:12px}@media(min-width:760px){.actions{grid-template-columns:repeat(2,1fr)}}
.uni{border:1px solid var(--line);border-radius:20px;padding:14px;margin:10px 0;background:white}.uniTop{display:flex;justify-content:space-between;gap:10px;align-items:flex-start}.uni strong{font-size:17px;color:var(--navy)}.small{font-size:12px;color:var(--muted);line-height:1.6}
.probBox{background:linear-gradient(135deg,#f0fdf4,#fff);border:1px solid #86efac;border-radius:16px;padding:11px;margin:9px 0}.probMain{display:flex;justify-content:space-between;align-items:center}.probMain b{color:#166534}.probPct{font-size:24px;font-weight:900;color:#166534}
.rank{display:inline-block;border-radius:999px;background:#ecfdf3;border:1px solid #abe7c3;color:#087443;font-size:12px;font-weight:900;padding:5px 9px}.improve{background:#fffaf0;border:1px solid #ffd166;color:#795200;border-radius:12px;padding:8px;margin-top:8px;font-size:12px;line-height:1.6;font-weight:800}
.qualityBadgeA,.qualityBadgeB,.qualityBadgeC,.qualityBadgeD,.qualityState{display:inline-block;border-radius:999px;padding:5px 9px;font-size:11px;font-weight:900;margin:2px}.qualityBadgeA{background:#ecfdf3;color:#087443;border:1px solid #abe7c3}.qualityBadgeB{background:#fffaf0;color:#795200;border:1px solid #ffd166}.qualityBadgeC{background:#e0f2fe;color:#075985;border:1px solid #7dd3fc}.qualityBadgeD,.qualityState{background:#f1f5f9;color:#475569;border:1px solid #cbd5e1}
.officialMini{background:#f8fbff;border:1px solid #bfd7ff;border-radius:14px;padding:9px;margin:8px 0;font-size:12px;line-height:1.6;color:#334155;font-weight:800}.officialMini strong{color:var(--navy)}
.sortBar{background:#fbfdff;border:1px solid var(--line);border-radius:18px;padding:12px;margin:10px 0}.sortBtns{display:flex;flex-wrap:wrap;gap:7px}.sortBtn{border:1px solid #bfd7ff;background:#eaf3ff;color:var(--navy);border-radius:999px;padding:7px 10px;font-size:12px;font-weight:900}.sortBtn.on{background:var(--navy);color:white}
.warning{background:#fffaf0;border:1px solid #ffd166;color:#795200;border-radius:16px;padding:12px;margin:10px 0;font-size:13px;line-height:1.7;font-weight:800}
.qualityMeterBox{background:linear-gradient(135deg,#f8fbff,#fff);border:1px solid #bfd7ff;border-radius:20px;padding:14px;margin:12px 0}.qualityMeterRow{display:grid;grid-template-columns:96px 1fr 48px;gap:8px;align-items:center;margin:8px 0;font-size:13px;font-weight:900;color:var(--navy)}.qualityBar{height:12px;border-radius:999px;background:#e2e8f0;overflow:hidden}.qualityBar span{display:block;height:100%;border-radius:999px;background:#94a3b8}.qualityBar.a span{background:#16a34a}.qualityBar.b span{background:#eab308}.qualityBar.c span{background:#38bdf8}
.footerCopy{text-align:center;color:var(--muted);font-weight:900;margin:12px 0}
@media print{header,.fixedMenu,.fixedHome,.menuOverlay,.noPrint{display:none!important}body{background:white}.card,.uni{box-shadow:none;border-color:#ddd}}


/* 進学コンパス2.0 Premium C案ブランド統合 */
:root{
  --brand-navy:#143B73;
  --brand-deep:#06152D;
  --brand-gold:#D4AF37;
}
.premiumSplash{
  position:fixed;
  inset:0;
  z-index:40000;
  background:
    radial-gradient(circle at 62% 32%, rgba(212,175,55,.14), transparent 19%),
    radial-gradient(circle at 28% 68%, rgba(255,255,255,.08), transparent 24%),
    linear-gradient(135deg,#06152D,#0B1D3D 42%,#143B73);
  display:flex;
  align-items:center;
  justify-content:center;
  overflow:hidden;
}
.premiumSplash.hide{
  animation:premiumFade .68s ease forwards;
}
.premiumSplashInner{
  width:min(250px,58vw);
  height:min(250px,58vw);
  display:flex;
  align-items:center;
  justify-content:center;
  position:relative;
  animation:premiumLogoIn .82s cubic-bezier(.2,.8,.2,1) both;
}
.premiumSplashInner::after{
  content:"";
  position:absolute;
  width:62%;
  height:62%;
  border-radius:999px;
  background:rgba(212,175,55,.10);
  filter:blur(30px);
  z-index:-1;
}
.premiumSplashLogo{
  width:100%;
  height:100%;
  object-fit:contain;
  display:block;
  filter:drop-shadow(0 26px 50px rgba(0,0,0,.34));
  animation:premiumFloat 2.2s ease-in-out infinite alternate;
}
.premiumSkip{
  position:absolute;
  right:16px;
  bottom:18px;
  border:1px solid rgba(255,255,255,.30);
  background:rgba(255,255,255,.10);
  color:white;
  border-radius:999px;
  padding:8px 12px;
  font-weight:900;
  cursor:pointer;
}
.brandMarkTop{
  width:38px;
  height:38px;
  object-fit:contain;
  vertical-align:middle;
  margin-right:6px;
  filter:drop-shadow(0 4px 8px rgba(0,0,0,.20));
}
header h1{
  display:flex;
  align-items:center;
  justify-content:center;
  gap:4px;
}
.hero{
  position:relative;
  overflow:hidden;
}
.hero::after{
  content:"";
  position:absolute;
  right:-22px;
  top:-28px;
  width:132px;
  height:132px;
  background-image:var(--brand-logo-url);
  background-size:contain;
  background-repeat:no-repeat;
  background-position:center;
  opacity:.13;
  pointer-events:none;
}
.modeHero{
  position:relative;
  overflow:hidden;
}
.modeHero::after{
  content:"";
  position:absolute;
  right:-10px;
  bottom:-38px;
  width:150px;
  height:150px;
  background-image:var(--brand-logo-url);
  background-size:contain;
  background-repeat:no-repeat;
  background-position:center;
  opacity:.16;
}
@keyframes premiumLogoIn{
  from{opacity:0;transform:scale(.86) translateY(8px)}
  to{opacity:1;transform:scale(1) translateY(0)}
}
@keyframes premiumFade{
  to{opacity:0;visibility:hidden}
}
@keyframes premiumFloat{
  from{transform:translateY(0) scale(1)}
  to{transform:translateY(-5px) scale(1.012)}
}

:root{--brand-logo-url:url('../assets/shingaku_compass_logo_c.png');}


/* 進学コンパス2.1 実用優先 */
.practicalSplash{
  position:fixed;
  inset:0;
  z-index:50000;
  display:flex;
  align-items:center;
  justify-content:center;
  background:linear-gradient(135deg,#06152D,#143B73);
  animation:practicalSplashOut .42s ease 1.25s forwards;
}
.practicalLogoWrap{
  width:min(170px,42vw);
  height:min(170px,42vw);
  display:flex;
  align-items:center;
  justify-content:center;
  animation:practicalLogoIn .42s ease both;
}
.practicalLogoWrap img{
  width:100%;
  height:100%;
  object-fit:contain;
  display:block;
  filter:drop-shadow(0 18px 34px rgba(0,0,0,.28));
}
@keyframes practicalLogoIn{
  from{opacity:0;transform:scale(.92)}
  to{opacity:1;transform:scale(1)}
}
@keyframes practicalSplashOut{
  to{opacity:0;visibility:hidden}
}
.brandMarkTop{
  width:34px!important;
  height:34px!important;
  object-fit:contain;
  vertical-align:middle;
  margin-right:6px;
}
.fixedHome,.fixedMenu{
  top:10px!important;
}
.modeBar .btn{
  padding:7px 11px;
}
.navCard{
  min-height:112px;
}
@media(max-width:420px){
  header{padding-top:56px!important}
  .fixedHome,.fixedMenu{font-size:12px;padding:8px 10px}
  .navCard h3{font-size:15px}
  .navCard p{font-size:12px}
}


/* 進学コンパス2.2 シンプルOP */
.simpleSplash{
  position:fixed;
  inset:0;
  z-index:50000;
  background:linear-gradient(135deg,#123a73,#2563eb);
  color:white;
  display:flex;
  align-items:center;
  justify-content:center;
  animation:simpleSplashOut .55s ease 2.0s forwards;
}
.simpleSplashInner{
  text-align:center;
  padding:24px;
  animation:simpleSplashIn .55s ease both;
}
.simpleSplashLogo{
  font-size:54px;
  line-height:1;
  margin-bottom:12px;
}
.simpleSplashTitle{
  font-size:34px;
  font-weight:900;
  letter-spacing:.08em;
}
.simpleSplashCopy{
  margin-top:10px;
  font-size:14px;
  font-weight:900;
  color:#eaf3ff;
}
.simpleSplashBadge{
  display:inline-block;
  margin-top:16px;
  background:#fff4c7;
  border:1px solid #ffd166;
  color:#795200;
  border-radius:999px;
  padding:8px 13px;
  font-size:12px;
  font-weight:900;
}
@keyframes simpleSplashIn{
  from{opacity:0;transform:translateY(8px)}
  to{opacity:1;transform:translateY(0)}
}
@keyframes simpleSplashOut{
  to{opacity:0;visibility:hidden}
}
@media(max-width:420px){
  .simpleSplashTitle{font-size:29px}
  .simpleSplashLogo{font-size:48px}
}


/* 進学コンパス2.3 UIリファイン */
.compassSplash{
  position:fixed;
  inset:0;
  z-index:50000;
  background:linear-gradient(135deg,#06152D,#143B73);

  display:flex;
  align-items:center;
  justify-content:center;
  animation:compassSplashOut .55s ease 2.0s forwards;

  padding:24px;

.compassSplashTitle{

/* 進学コンパス2.4 UI完成イメージ寄せ版 */
body{padding-bottom:72px}
.v24Splash{position:fixed;inset:0;z-index:60000;background:#fbfdff;display:flex;align-items:center;justify-content:center;color:#0b1d3d;animation:v24SplashOut .55s ease 2.15s forwards}
.v24SplashInner{text-align:center;animation:v24SplashIn .55s ease both}
.v24SplashInner img{width:105px;height:105px;object-fit:contain;margin-bottom:18px}
.v24SplashTitle{font-size:35px;font-weight:900;letter-spacing:.08em;color:#0b1d3d}
.v24SplashCopy{margin-top:10px;font-size:14px;font-weight:900;color:#143B73}
.v24Load{width:160px;height:4px;border-radius:999px;background:#e2e8f0;margin:28px auto 0;overflow:hidden}
.v24Load span{display:block;height:100%;width:0;background:#143B73;animation:v24Load 1.7s ease forwards}
@keyframes v24SplashIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
@keyframes v24SplashOut{to{opacity:0;visibility:hidden}}
@keyframes v24Load{to{width:100%}}
header{background:linear-gradient(135deg,#06152D,#143B73)!important;padding:16px 16px 18px!important;position:sticky;top:0;z-index:1000}
header h1{font-size:20px!important;justify-content:flex-start!important;max-width:1080px;margin:0 auto!important}
header p{display:none}
.brandMarkTop{width:32px!important;height:32px!important;object-fit:contain;margin-right:6px}
.fixedHome{display:none!important}
.fixedMenu{top:12px!important;right:12px!important;background:transparent!important;color:white!important;box-shadow:none!important;font-size:22px!important;padding:8px!important}
.card{border-radius:22px!important;box-shadow:0 10px 26px rgba(20,59,115,.07)!important}
.hero{background:linear-gradient(135deg,#dceeff,#ffffff 54%,#eef6ff)!important;color:#0b1d3d!important;border:1px solid #dbe7f6;box-shadow:none!important;min-height:170px}
.hero h2{color:#0b1d3d!important;font-size:26px!important}
.hero .copy{color:#143B73!important;max-width:540px}
.hero .badge{background:#ecfdf3!important;color:#087443!important;border-color:#abe7c3!important}
.searchBox{box-shadow:0 8px 20px rgba(20,59,115,.08)}
.modeBar{background:#f8fbff!important}
.grid{grid-template-columns:repeat(4,1fr)!important;gap:12px!important}
.navCard{text-align:center!important;border-radius:18px!important;min-height:120px!important;padding:14px 8px!important}
.navCard.wide{grid-column:auto!important}
.navIcon{width:54px;height:54px;margin:0 auto 10px;border-radius:16px;background:#eef6ff;display:flex;align-items:center;justify-content:center;font-size:30px}
.navCard:nth-child(2n) .navIcon{background:#ecfdf3}
.navCard:nth-child(3n) .navIcon{background:#f5f0ff}
.navCard:nth-child(4n) .navIcon{background:#fff1f2}
.navCard h3{font-size:14px!important}
.navCard p{display:none}
.menuPanel{top:0!important;right:0!important;width:min(430px,100vw)!important;height:100vh!important;border-radius:0!important;padding:20px!important}
.menuPanel h3{font-size:22px;margin-top:8px}
.menuBtn{border-radius:14px!important;padding:13px 12px!important;margin:4px 0!important;border:1px solid transparent!important}
.menuBtn:hover,.menuBtn:first-child{background:#eef6ff!important;border-color:#dbe7f6!important}
.bottomNav{position:fixed;left:0;right:0;bottom:0;z-index:10000;background:white;border-top:1px solid #dbe7f6;display:grid;grid-template-columns:repeat(5,1fr);padding:7px 4px calc(7px + env(safe-area-inset-bottom));box-shadow:0 -8px 22px rgba(20,59,115,.08)}
.bottomNav button{border:0;background:white;color:#143B73;font-weight:900;font-size:18px;display:flex;flex-direction:column;align-items:center;gap:2px}
.bottomNav span{font-size:10px}
.uni{border-radius:18px!important}

.officialSprintBox{background:#f8fbff;border:1px solid #bfd7ff;border-radius:18px;padding:12px;margin:10px 0}

.confirmStatusBox{
  background:#f8fbff;

  padding:9px;
  margin:8px 0;

  line-height:1.65;

  border:1px solid #dbe7f6;
  background:#f1f5f9;

}

  background:#ecfdf3;
  color:#087443;
  border-color:#abe7c3;
}
.confirmStatusPill.partial{
  background:#fffaf0;
  color:#795200;
  border-color:#ffd166;
}
.confirmStatusPill.basic{
  background:#e0f2fe;
  color:#075985;
  border-color:#7dd3fc;
}
.confirmChecklist{
  display:grid;

  margin-top:6px;
}

  background:white;
  border:1px solid #edf2f7;
  border-radius:10px;
  padding:6px 8px;
}
.qualityBadgeA,.qualityBadgeB,.qualityBadgeC,.qualityBadgeD{
  display:none!important;
}
.bottomNav{
  grid-template-columns:repeat(5,1fr)!important;
}

  border:1px solid #dbe7f6;
  border-radius:18px;
  padding:12px;
  margin:10px 0;
}

/* 進学コンパス2.9 検索・公式リンク強化 */
function uniqueSorted(arr){return [...new Set(arr.filter(Boolean))].sort();}
function typeOrder(t){return t==="国立"?1:t==="公立"?2:t==="私立"?3:9;}
function applySort29(list){
  const s=state.sort||"recommend";
  const a=[...list];
  if(s==="name") return a.sort((x,y)=>x.name.localeCompare(y.name,"ja"));
  if(s==="levelHigh") return a.sort((x,y)=>(y.level||0)-(x.level||0));
  if(s==="levelLow") return a.sort((x,y)=>(x.level||0)-(y.level||0));
  if(s==="national") return a.sort((x,y)=>typeOrder(x.type)-typeOrder(y.type));
  if(s==="private") return a.sort((x,y)=>typeOrder(y.type)-typeOrder(x.type));
  if(s==="area") return a.sort((x,y)=>(x.area+x.pref+x.name).localeCompare(y.area+y.pref+y.name,"ja"));
  if(s==="prob" && typeof probability==="function") return a.sort((x,y)=>probability(y)-probability(x));
  return typeof sortList==="function" ? sortList(a) : a;
}
function sortControl29(){
  const items=[["recommend","おすすめ"],["prob","合格可能性"],["levelHigh","偏差値高い"],["levelLow","偏差値低い"],["name","五十音"],["national","国公立→私立"],["private","私立→国公立"],["area","地域順"]];
  return `<div class="sortAlways">${items.map(i=>`<button class="${(state.sort||"recommend")===i[0]?"on":""}" onclick="state.sort='${i[0]}';renderSearchResults29(currentResults||universities)">${i[1]}</button>`).join("")}</div>`;
}

  currentResults=list;

  document.getElementById("app").innerHTML=`<div class="card"><h2>検索結果</h2>${filterPanel29()}<div class="resultCount">${list.length}校が見つかりました</div>${sortControl29()}${sorted.map(uniCard).join("")||"<p>該当がありません。</p>"}</div>`;
  scrollTo(0,0);
}

  const prefs=uniqueSorted(universities.filter(u=>!selectedArea||u.area===selectedArea).map(u=>u.pref));
  const types=uniqueSorted(universities.map(u=>u.type));
  const fields=["情報","AI","医療","看護","薬","教育","心理","美術","芸術","音楽","デザイン","スポーツ","建築","経済","経営","法律","国際","外国語","農学","動物","環境"];
  return `<div class="filterSticky">
    <input id="uq" placeholder="大学名・地域・学部・興味を入力" value="${state.filterQuery||""}">
    <div class="filterGrid">
      <div><label>地域</label><select id="fArea" onchange="state.filterArea=this.value;state.filterPref='';renderUniversitySearch()"><option value="">すべて</option>${areas.map(x=>`<option ${selectedArea===x?"selected":""}>${x}</option>`).join("")}</select></div>
      <div><label>都道府県</label><select id="fPref"><option value="">すべて</option>${prefs.map(x=>`<option ${state.filterPref===x?"selected":""}>${x}</option>`).join("")}</select></div>
      <div><label>種別</label><select id="fType"><option value="">すべて</option>${types.map(x=>`<option ${state.filterType===x?"selected":""}>${x}</option>`).join("")}</select></div>
      <div><label>分野</label><select id="fField"><option value="">すべて</option>${fields.map(x=>`<option ${state.filterField===x?"selected":""}>${x}</option>`).join("")}</select></div>
    </div>
    <div class="levelSelectRow">
      <div><label>偏差値下限</label><select id="fLevelMin"><option value="">なし</option>${[40,45,50,55,60,65].map(x=>`<option ${state.filterLevelMin==x?"selected":""}>${x}</option>`).join("")}</select></div>
      <div><label>偏差値上限</label><select id="fLevelMax"><option value="">なし</option>${[45,50,55,60,65,70].map(x=>`<option ${state.filterLevelMax==x?"selected":""}>${x}</option>`).join("")}</select></div>
    </div>
    <div class="actions"><button class="btn" onclick="searchUniAdvanced29()">検索更新</button><button class="btn gray" onclick="clearFilters29()">条件クリア</button></div>
    ${sortControl29()}
  </div>`;
}

  state.filterQuery="";state.filterArea="";state.filterPref="";state.filterType="";state.filterField="";state.filterLevelMin="";state.filterLevelMax="";
  renderUniversitySearch();
}

function searchUniAdvanced29(){
  state.filterQuery=document.getElementById("uq").value.trim();
  state.filterArea=document.getElementById("fArea").value;
  state.filterPref=document.getElementById("fPref").value;
  state.filterType=document.getElementById("fType").value;
  state.filterField=document.getElementById("fField").value;
  state.filterLevelMin=document.getElementById("fLevelMin").value;
  state.filterLevelMax=document.getElementById("fLevelMax").value;
  const q=state.filterQuery, area=state.filterArea, pref=state.filterPref, type=state.filterType, field=state.filterField;
  const min=Number(state.filterLevelMin||0), max=Number(state.filterLevelMax||999);
  const list=universities.filter(u=>{
    const text=(u.name+u.pref+u.area+u.type+u.field+(u.faculties||[]).join("")+(u.departments||[]).join(""));
    return (!q||text.includes(q))&&(!area||u.area===area)&&(!pref||u.pref===pref)&&(!type||u.type===type)&&(!field||text.includes(field))&&((u.level||0)>=min)&&((u.level||0)<=max);
  });
  renderSearchResults29(list);
}

}
