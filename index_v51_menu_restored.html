/* === 起動アニメーション：進学コンパス === */
.splash{
  position:fixed;
  inset:0;
  z-index:99999;
  display:flex;
  align-items:center;
  justify-content:center;
  background:linear-gradient(135deg,#0b2f6f,#2563eb);
  color:#fff;
  transition:opacity .75s ease, visibility .75s ease;
}
.splash.fade{
  opacity:0;
  visibility:hidden;
  pointer-events:none;
}
.splash-content{
  text-align:center;
  padding:24px;
  animation:splashPop .75s ease both;
}
.splash-compass{
  font-size:88px;
  line-height:1;
  animation:spinCompass 2.3s cubic-bezier(.25,.9,.25,1) both;
  filter:drop-shadow(0 14px 24px rgba(0,0,0,.28));
}
.splash-title{
  font-size:34px;
  font-weight:900;
  margin:16px 0 6px;
  letter-spacing:.04em;
  text-shadow:0 3px 12px rgba(0,0,0,.22);
}
.splash-copy{
  color:rgba(255,255,255,.9);
  font-size:14px;
  font-weight:800;
  margin:0;
}
.splash-loading{
  width:170px;
  height:6px;
  background:rgba(255,255,255,.28);
  border-radius:999px;
  margin:24px auto 0;
  overflow:hidden;
}
.splash-loading span{
  display:block;
  height:100%;
  width:0;
  background:linear-gradient(90deg,#f6b73c,#ffffff);
  border-radius:999px;
  animation:loadBar 3s ease forwards;
}
@keyframes spinCompass{
  0%{transform:rotate(-220deg) scale(.72);opacity:0}
  55%{transform:rotate(20deg) scale(1.08);opacity:1}
  100%{transform:rotate(0deg) scale(1)}
}
@keyframes splashPop{
  0%{transform:translateY(14px);opacity:0}
  100%{transform:translateY(0);opacity:1}
}
@keyframes loadBar{
  0%{width:0}
  100%{width:100%}
}

function esc(s){return String(s??"").replace(/[&<>"']/g,m=>({"&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;","'":"&#39;"}[m]))}
function today(){return new Date().toISOString().slice(0,10)}
function stars(n){n=Math.max(1,Math.min(5,Math.round(n))); return "★★★★★".slice(0,n)+"☆☆☆☆☆".slice(0,5-n)}

function levelNum(){let v=answers.level||"55前後"; if(v.includes("45"))return 45;if(v.includes("50"))return 50;if(v.includes("55"))return 55;if(v.includes("60"))return 60;if(v.includes("65"))return 65;return 55}
function areaRank(area){let order=prefOrder[answers.residence||"愛知県"]||prefOrder["愛知県"]; let i=order.indexOf(area); return i<0?99:i}
function prefNearScore(u){let base=areaRank(u.area)*10; if(u.pref===(answers.residence||"愛知県"))base-=5; return base}
function fieldMatch(u){
 let tr=answers.track||"";
 let f=u.field+" "+u.faculties.join(" ");
 if(tr==="まだ未定"||!tr)return 2;
 if(tr==="教育"){if(/教育|教員|児童/.test(f))return 10;if(/心理|福祉|人間/.test(f))return 4;return -4;}
 if(tr==="医療"){if(/医|看護|薬|保健|医療|歯/.test(f))return 10;if(/福祉|心理|生命/.test(f))return 4;return -4;}
 if(tr==="理系"){if(/理|工|情報|建築|データ|科学|農|生命/.test(f))return 9;if(/医|薬|看護/.test(f))return 5;return -3;}
 if(tr==="文系"){if(/文|法|経済|経営|商|社会|政策|心理|人文/.test(f))return 9;if(/国際|外国語|教育/.test(f))return 5;return -3;}
 if(tr==="国際"){if(/国際|外国語|英語|グローバル|教養/.test(f))return 10;if(/文|経済|経営|商/.test(f))return 4;return -4;}
 if(tr==="芸術"){if(/芸術|美術|音楽|デザイン|映像|メディア/.test(f))return 10;if(/表現|文化/.test(f))return 4;return -5;}
 return 1;
}
function allowedByArea(u){let areas=answers.areas||[]; if(answers.commute==="全国OK")return true; if(!areas.length)return true; if(answers.commute==="通学のみ")return u.pref===(answers.residence||"愛知県") || u.area===areaOptions[Math.min(areaRank(u.area), areaRank(u.area))] && areaRank(u.area)===0; return areas.includes(u.area)}
function isMajorMismatch(u){let tr=answers.track||"";let f=u.field+" "+u.faculties.join(" ");if(tr==="まだ未定"||!tr)return false;if(tr==="教育")return !/教育|教員|児童|心理|福祉|人間/.test(f);if(tr==="医療")return !/医|看護|薬|保健|医療|歯|福祉|心理|生命/.test(f);if(tr==="理系")return !/理|工|情報|建築|データ|科学|農|生命|医|薬|看護/.test(f);if(tr==="文系")return !/文|法|経済|経営|商|社会|政策|心理|人文|国際|外国語|教育/.test(f);if(tr==="国際")return !/国際|外国語|英語|グローバル|教養|文|経済|経営|商/.test(f);if(tr==="芸術")return !/芸術|美術|音楽|デザイン|映像|メディア|表現|文化/.test(f);return false}
function matchScore(u){let s=fieldMatch(u)*2.2;let areas=answers.areas||[];if(areas.includes(u.area))s+=4;s+=Math.max(0,4-areaRank(u.area));if(answers.kind==="国公立中心"&&(u.type==="国立"||u.type==="公立"))s+=3;if(answers.kind==="国公立中心"&&u.type==="私立")s-=1.5;if(answers.kind==="私立中心"&&u.type==="私立")s+=3;if(answers.kind==="私立中心"&&(u.type==="国立"||u.type==="公立"))s-=1;if(u.pref===(answers.residence||"愛知県"))s+=2;s-=Math.abs(u.level-levelNum())/5;if(isMajorMismatch(u))s-=10;return s}

function careerTypeProfile(u){
 const f=(u.field+" "+u.faculties.join(" "));
 let type="地元企業・一般就職型";
 let reason="一般企業・地域企業・公務員など、幅広い進路を確認するタイプです。";
 let score=3;

 const topNames=["東京大学","京都大学","大阪大学","名古屋大学","東北大学","九州大学","北海道大学","一橋大学","東京工業大学","早稲田大学","慶應義塾大学","東京理科大学"];
 const strongNames=["神戸大学","筑波大学","横浜国立大学","千葉大学","広島大学","岡山大学","金沢大学","東京都立大学","大阪公立大学","名古屋市立大学","同志社大学","立命館大学","関西学院大学","関西大学","明治大学","青山学院大学","立教大学","中央大学","法政大学","上智大学","芝浦工業大学","名古屋工業大学","名城大学","南山大学"];

 if(topNames.includes(u.name)){
   type="全国トップ・大手/研究職型";
   reason="全国的な知名度・難関企業・研究職・大学院進学・難関専門職につながりやすい層です。";
   score=5;
 }else if(strongNames.includes(u.name)){
   type="大手企業・地域上位型";
   reason="大手企業・地域有力企業・専門職・公務員などに広げやすい層です。";
   score=4;
 }

 if(/医|看護|薬|保健|医療|歯/.test(f)){
   type="医療資格・専門職型";
   reason="医療資格や専門職に直結しやすい分野です。大手企業型とは別軸で評価します。";
   score=Math.max(score,4);
   if(/医学|医科|医療|薬|歯/.test(u.name+f))score=Math.max(score,4);
 }
 if(/教育|教員|児童/.test(f)){
   type="教員・公務員型";
   reason="教員採用・教育関連・公務員などを目指しやすい分野です。";
   score=Math.max(score,4);
 }
 if(/理|工|情報|建築|データ|科学/.test(f) && score<5){
   type=score>=4?type:"技術職・メーカー型";
   reason=score>=4?reason:"技術職・メーカー・IT・インフラ系に進みやすい分野です。";
   score=Math.max(score,3);
 }
 if(/芸術|美術|音楽|デザイン|映像/.test(f)){
   type="専門職・クリエイター型";
   reason="制作・表現・デザインなど専門分野で強みを出すタイプです。一般就職の星だけで判断しない方がよい大学です。";
   score=Math.min(score,3);
 }
 if(/福祉|心理/.test(f) && score<4){
   type="福祉・心理・対人支援型";
   reason="福祉・心理・教育支援など対人支援分野に進みやすいタイプです。";
   score=3;
 }
 return {type,reason,score};
}
function employmentScore(u){
 const p=careerTypeProfile(u);
 return p.score;
}

 return "要確認";
}

function sortList(list){let mode=answers.sort||"おすすめ順（就職の安定性重視）";if(mode==="偏差値が高い順")return list.sort((a,b)=>b.level-a.level||matchScore(b)-matchScore(a));if(mode==="自宅から近い順")return list.sort((a,b)=>prefNearScore(a)-prefNearScore(b)||matchScore(b)-matchScore(a));return list.sort((a,b)=>{const mismatchA=isMajorMismatch(a)?-25:0;const mismatchB=isMajorMismatch(b)?-25:0;const scoreA=fieldMatch(a)*4.0+employmentScore(a)*3.0+matchScore(a)*0.8-prefNearScore(a)*0.08+mismatchA;const scoreB=fieldMatch(b)*4.0+employmentScore(b)*3.0+matchScore(b)*0.8-prefNearScore(b)*0.08+mismatchB;return scoreB-scoreA||b.level-a.level})}
function ratings(u){let lv=levelNum(),diff=u.level-lv,fit=Math.max(1,Math.min(5,Math.round(matchScore(u)/2)));let chance=Math.max(1,Math.min(5,Math.round(4-diff/5)));let future=/総合|難関|工|医療|教育|国際/.test(u.field)?4:3;let campus=u.type==="私立"?4:3;return{fit,chance,future,campus}}
function careerImage(u){let f=u.field;if(/医療/.test(f))return["病院・医療機関","薬局・医療関連企業","保健・福祉分野","医療専門職"];if(/教育/.test(f))return["小学校・中学校・高校教員","公務員","教育関連企業","児童・福祉分野"];if(/理|工|情報/.test(f))return["メーカー・IT企業","研究開発・技術職","インフラ・通信","建築・設計分野"];if(/国際|外国語/.test(f))return["航空・旅行・ホテル","商社・メーカー海外部門","英語を使う事務職","国際交流・サービス"];if(/芸術/.test(f))return["デザイン・制作会社","広告・映像・ゲーム関連","作家・クリエイター","音楽・舞台関連"];if(/福祉|心理/.test(f))return["福祉施設・医療福祉分野","公務員","心理・教育関連","生活支援分野"];if(/経済|商|文|法/.test(f))return["金融・保険","メーカー・商社","公務員","広告・サービス業"];return["一般企業","公務員","専門職","地域企業"]}
function examTypes(u){let arr=["一般選抜","共通テスト利用"];if(u.type!=="国立")arr.push("学校推薦型選抜");arr.push("総合型選抜");return arr}
function hitFaculties(u){let tr=answers.track||"";if(tr==="まだ未定"||!tr)return u.faculties.slice(0,3);let words=[];if(tr==="文系")words=["文","法","経済","経営","商","社会","政策","心理","人文"];if(tr==="理系")words=["理","工","情報","建築","農","生命","科学"];if(tr==="医療")words=["医","看護","薬","保健","医療","歯"];if(tr==="教育")words=["教育","児童","教員"];if(tr==="国際")words=["国際","外国語","英語","グローバル","教養"];if(tr==="芸術")words=["芸術","美術","音楽","デザイン","映像","メディア"];let hits=u.faculties.filter(f=>words.some(w=>f.includes(w)));return hits.length?hits:u.faculties.slice(0,3)}
function hitReason(u){let hits=hitFaculties(u);let areaOk=(answers.areas||[]).includes(u.area)||answers.commute==="全国OK";let parts=[];if(!isMajorMismatch(u))parts.push("選択分野に一致");else parts.push("選択分野とはやや別系統");if(hits.length)parts.push("学部："+hits.slice(0,4).map(esc).join("・"));if(areaOk)parts.push("エリア："+esc(u.area));if(u.pref===(answers.residence||"愛知県"))parts.push("居住地と同一県");return parts.join(" ／ ")}
function facultyChips(u,limit=8){let hits=hitFaculties(u);return `<div class="facultyList">${u.faculties.slice(0,limit).map(x=>`<span class="faculty ${hits.includes(x)?"hit":""}">${esc(x)}</span>`).join("")}</div>`}

const subjectLabels={english:"英語",japanese:"国語",math:"数学",science:"理科",social:"社会",info:"情報"};
function subjectVal(k){const v=Number((answers.deepScores||{})[k]);return isNaN(v)||v<=0?null:v}
function deepAverage(){const vals=Object.keys(subjectLabels).map(subjectVal).filter(v=>v!==null);if(!vals.length)return levelNum();return Math.round(vals.reduce((a,b)=>a+b,0)/vals.length)}
function updateLevelFromDeep(){const avg=deepAverage();if(avg>=63)answers.level="65以上";else if(avg>=58)answers.level="60前後";else if(avg>=53)answers.level="55前後";else if(avg>=48)answers.level="50前後";else answers.level="45前後"}
function sortedSubjects(){return Object.keys(subjectLabels).map(k=>({key:k,label:subjectLabels[k],value:subjectVal(k)})).filter(x=>x.value!==null).sort((a,b)=>b.value-a.value)}
function strongSubjects(){return sortedSubjects().filter(x=>x.value>=55).slice(0,3)}
function weakSubjects(){return [...sortedSubjects()].reverse().filter(x=>x.value<55).slice(0,3)}
function subjectPriority(){const vals=Object.keys(subjectLabels).map(k=>({key:k,label:subjectLabels[k],value:subjectVal(k)})).filter(x=>x.value!==null);const field=answers.deepField||answers.track||"";let weight={english:1,japanese:1,math:1,science:1,social:1,info:1};if(/理系|情報|理工|工学|医療|看護/.test(field)){weight.math+=1.2;weight.science+=1.1;weight.english+=0.6}if(/文系|法|経済|経営|国際|外国語|教育/.test(field)){weight.english+=1.0;weight.japanese+=0.8;weight.social+=0.5}if(/情報/.test(field)){weight.math+=1.0;weight.info+=1.2;weight.english+=0.5}return vals.map(x=>({...x,priority:(65-x.value)*weight[x.key]})).sort((a,b)=>b.priority-a.priority).slice(0,3)}
function scoreFitForUniversity(u){const avg=deepAverage();const gap=u.level-avg;let score=matchScore(u)+employmentScore(u)*2-gap*0.6;const f=(u.field+" "+u.faculties.join(" "));const field=answers.deepField||answers.track||"";if(field&&field!=="まだ未定"){if(field==="教育"&&/教育|児童|教員/.test(f))score+=8;if((field==="医療"||field==="看護")&&/医|看護|薬|保健|医療|歯/.test(f))score+=8;if(field==="情報"&&/情報|データ|工|理工/.test(f))score+=8;if(field==="理系"&&/理|工|情報|農|生命|建築/.test(f))score+=7;if(field==="文系"&&/文|法|経済|経営|商|社会|政策/.test(f))score+=7;if((field==="国際"||field==="外国語")&&/国際|外国語|英語|グローバル/.test(f))score+=7;if(field==="芸術"&&/芸術|美術|音楽|デザイン|映像/.test(f))score+=8}return score}
function deepCandidates(min,max){const avg=deepAverage();const base=allFiltered().filter(u=>u.level-avg>=min&&u.level-avg<=max);return base.sort((a,b)=>scoreFitForUniversity(b)-scoreFitForUniversity(a)).slice(0,6)}
function deepAdviceText(){const avg=deepAverage();const strong=strongSubjects().map(x=>x.label+"("+x.value+")");const weak=weakSubjects().map(x=>x.label+"("+x.value+")");const pri=subjectPriority().map(x=>x.label);let msg=[];msg.push(`総合偏差値目安は${avg}前後です。`);if(strong.length)msg.push(`強みは${strong.join("・")}です。ここは得点源として維持しましょう。`);if(weak.length)msg.push(`弱みは${weak.join("・")}です。志望校との差を縮めるには、まず弱点科目の基礎固めが必要です。`);if(pri.length)msg.push(`優先学習は${pri.join(" → ")}の順がおすすめです。`);msg.push("比較では、チャレンジ校・適正校・安全校を1校ずつ入れると受験戦略が立てやすくなります。");return msg.join("\n")}

function universityQualityRank(u){
 if(typeof coreVerifiedNames!=="undefined" && coreVerifiedNames.has(u.name))return "重点確認対象";
 if(u.type==="国立"||u.type==="公立")return "国公立重点確認";

}
function universityDataJson(u){
 return JSON.stringify(u,null,2);
}
function copyUniversityData(name){
 const u=getU(name);
 if(!u)return;
 const text=universityDataJson(u);
 navigator.clipboard&&navigator.clipboard.writeText(text);
 alert("大学データをコピーしました。");
}

function filteredAdminUniversities(){
 const q=(document.getElementById("adminSearch")?.value||"").trim();
 const area=document.getElementById("adminArea")?.value||"すべて";
 const type=document.getElementById("adminType")?.value||"すべて";
 const quality=document.getElementById("adminQuality")?.value||"すべて";
 let list=universities.filter(u=>{
   const text=(u.name+" "+u.pref+" "+u.area+" "+u.type+" "+u.field+" "+u.faculties.join(" "));
   if(q && !text.includes(q))return false;
   if(area!=="すべて" && u.area!==area)return false;
   if(type!=="すべて" && u.type!==type)return false;
   if(quality!=="すべて" && universityQualityRank(u)!==quality)return false;
   return true;
 });
 return list.sort((a,b)=>b.level-a.level||a.name.localeCompare(b.name,"ja"));
}

let activeRouteCategory="すべて";
function routeMatchesUniversity(route,u){
 const text=(u.name+" "+u.field+" "+u.faculties.join(" "));
 return route.match.some(m=>text.includes(m));
}
function recommendedUniversitiesForRoute(route){
 let list=universities.filter(u=>routeMatchesUniversity(route,u));
 if(!list.length){
   list=universities.filter(u=>route.fields.some(f=>(u.field+" "+u.faculties.join(" ")).includes(f.slice(0,2))));
 }
 return list.sort((a,b)=>matchScore(b)-matchScore(a)||b.level-a.level).slice(0,8);
}

let recentActions=JSON.parse(localStorage.getItem("shingaku_recent_actions")||"[]");
function addRecentAction(label,fnName){
 recentActions=recentActions.filter(x=>x.label!==label);
 recentActions.unshift({label,fnName,time:Date.now()});
 recentActions=recentActions.slice(0,5);
 localStorage.setItem("shingaku_recent_actions",JSON.stringify(recentActions));
}
function runRecent(fnName){
 if(typeof window[fnName]==="function")window[fnName]();
}
function homeSearchRun(){
 const q=(document.getElementById("homeSearchInput")?.value||"").trim();
 if(!q)return;
 const uni=universities.find(u=>u.name.includes(q))||universities.find(u=>(u.field+" "+u.faculties.join(" ")+" "+u.pref).includes(q));
 if(uni){
   addRecentAction("検索："+uni.name,"renderHome");
   renderDetail(uni.name);
   return;
 }
 if(typeof possibilityRoutes!=="undefined"){
   const hit=possibilityRoutes.find(r=>(r.label+" "+r.keywords.join(" ")+" "+r.fields.join(" ")+" "+r.careers.join(" ")).includes(q));
   if(hit){
     activeRouteCategory="すべて";
     renderPossibilityMap();
     setTimeout(()=>{const e=document.getElementById("routeSearch");if(e){e.value=q;e.dispatchEvent(new Event("input"));}},0);
     return;
   }
 }
 alert("該当候補が見つかりません。別の言葉で検索してください。");
}

function domainMatchesUniversity(domain,u){
 const text=(u.name+" "+u.field+" "+u.faculties.join(" "));
 return domain.match.some(m=>text.includes(m));
}
function domainUniversities(domain){
 return universities.filter(u=>domainMatchesUniversity(domain,u)).sort((a,b)=>matchScore(b)-matchScore(a)||b.level-a.level).slice(0,10);
}

 selectedAptitudes.forEach(id=>{

function toggleMulti(key,val){let arr=answers[key]||[];if(arr.includes(val))arr=arr.filter(x=>x!==val);else arr.push(val);answers[key]=arr;renderQuestion()}

function allFiltered(){return universities.filter(allowedByArea)}
function bucket(min,max){let lv=levelNum();let base=allFiltered().filter(u=>u.level-lv>=min&&u.level-lv<=max);let matched=base.filter(u=>!isMajorMismatch(u));if(matched.length>=4)return sortList(matched).slice(0,10);return sortList(base).slice(0,10)}

function admissionChance(u){
 let avg = (typeof deepAverage==="function" ? deepAverage() : levelNum());
 let diff = avg - u.level;
 let chance = 60 + diff*4;
 chance += Math.min(8, Math.max(-6, fieldMatch(u)*1.2));
 chance += (employmentScore(u)-3)*2;
 if(u.type==="国立"||u.type==="公立")chance -= 4;
 if(/難関/.test(u.field))chance -= 5;
 if(isMajorMismatch(u))chance -= 12;
 return Math.max(18, Math.min(92, Math.round(chance)));
}
function chanceJudge(rate){
 if(rate>=85)return "🟢 安全圏";
 if(rate>=70)return "🔵 合格圏";
 if(rate>=50)return "🟡 実力相応";
 if(rate>=35)return "🟠 チャレンジ";
 return "🔴 難関挑戦";
}
function chanceHtml(u){

 return `${probabilityHtml(u)}${resultMetricsHtml(u)}<div class="chanceArea">

 </div>`;
}

function campusLifeProfile(u){
 let o=campusLifeOverrides[u.name];
 if(o){
   return {...o};
 }
 let f=(u.field+" "+u.faculties.join(" "));
 let study=3,circle=3,job=3,global=2,access=3;
 if(u.type==="国立"||u.type==="公立"){study+=1}
 if(u.type==="私立"){circle+=1;access+=1}
 if(/理|工|情報|医|薬|看護|農|生命|科学/.test(f)){study+=1}
 if(/医|看護|薬|保健|医療|歯|教育|教員|工|理工|情報/.test(f)){job+=2}
 if(/経済|経営|商|法/.test(f)){job+=1}
 if(/国際|外国語|英語|グローバル|教養/.test(f)){global+=3}
 if(/芸術|美術|音楽|デザイン|映像/.test(f)){study+=1;circle+=1}
 if(u.pref===(answers.residence||"愛知県")){access+=1}
 if(u.level>=60){study+=1;job+=1}
 if(u.level<=48){study-=1;circle+=1}
 study=Math.max(1,Math.min(5,study));
 circle=Math.max(1,Math.min(5,circle));
 job=Math.max(1,Math.min(5,job));
 global=Math.max(1,Math.min(5,global));
 access=Math.max(1,Math.min(5,access));
 return {study,circle,job,global,access,note:"大学種別・学部構成・地域から作成した面談用の目安です。"};
}

   {label:"💼 就職・資格重視型",value:profile.job,comment:"卒業後の進路や資格取得を意識しやすい大学です。"},
   {label:"🌏 国際交流重視型",value:profile.global,comment:"語学・留学・国際系に関心がある生徒向けです。"},
   {label:"🎉 学生生活充実型",value:profile.circle,comment:"サークルやイベントも含めて大学生活を楽しみやすいタイプです。"},
   {label:"🚃 通学しやすさ重視型",value:profile.access,comment:"通学や生活面を重視したい生徒に合いやすいタイプです。"}
 ];
 items.sort((a,b)=>b.value-a.value);
 return items[0];
}

 if(u.type==="国立"||u.type==="公立"){subjects.push("共通テスト5〜6教科確認","個別試験科目確認");cautions.push("国公立は学部・日程で科目と配点が大きく変わります。");}
 if(/文|法|経済|経営|商|社会|政策|人文/.test(f)){subjects.push("英語","国語","地歴公民");advice.push("文系は英語・国語・社会を安定させる。");}
 if(/理|工|情報|建築|データ|科学|農|生命/.test(f)){subjects.push("英語","数学","理科");cautions.push("理系は数学IIIや理科の範囲に注意。");advice.push("数学と理科を早めに固める。");}
 if(/医|看護|薬|保健|医療|歯/.test(f)){subjects.push("英語","数学","理科","面接・小論文確認");cautions.push("医療系は面接・小論文・理科指定に注意。");advice.push("医療職を目指す理由を説明できるようにする。");}
 if(/教育|教員|児童/.test(f)){subjects.push("英語","国語","面接・小論文確認");cautions.push("教育系は面接・小論文・実技の有無を確認。");advice.push("志望理由と将来像を早めに言語化する。");}
 if(/国際|外国語|英語|グローバル/.test(f)){subjects.push("英語重視","英検利用確認","国語");cautions.push("英語外部検定利用の有無を確認。");advice.push("英語長文・語彙・リスニングを重点強化。");}
 if(/芸術|美術|音楽|デザイン|映像/.test(f)){subjects.push("実技確認","小論文・面接確認","作品提出確認");cautions.push("芸術系は実技・作品提出・面接の比重に注意。");advice.push("作品準備と基礎学力の両方を進める。");}

 subjects=[...new Set(subjects)];cautions=[...new Set(cautions)];advice=[...new Set(advice)];

function currentGradeForPlan(){
 let g=(student.grade||answers.grade||"").trim();
 if(g.includes("高1"))return "高1";
 if(g.includes("高2"))return "高2";
 if(g.includes("高3"))return "高3";
 if(g.includes("既卒"))return "既卒";
 return answers.grade||"高2";
}
function planSubjectPriority(u){
 const f=(u.field+" "+u.faculties.join(" "));
 let main=[], sub=[], special=[];
 if(/医|看護|薬|保健|医療|歯/.test(f)){main=["英語","数学","理科"];sub=["面接","小論文"];special=["医療職への志望理由"];}
 else if(/理|工|情報|建築|データ|科学|農|生命/.test(f)){main=["数学","英語","理科"];sub=["情報","記述答案"];special=["数学III・物理/化学の完成"];}
 else if(/文|法|経済|経営|商|社会|政策|人文/.test(f)){main=["英語","国語","地歴公民"];sub=["小論文","資料読解"];special=["英語長文と選択科目の高得点化"];}
 else if(/教育|教員|児童/.test(f)){main=["英語","国語","数学基礎"];sub=["面接","小論文"];special=["教育への志望理由"];}
 else if(/国際|外国語|英語|グローバル/.test(f)){main=["英語","国語","地歴公民"];sub=["英検","リスニング"];special=["英語を得点源にする"];}
 else if(/芸術|美術|音楽|デザイン|映像/.test(f)){main=["英語","国語","実技"];sub=["作品制作","面接"];special=["ポートフォリオ・作品準備"];}
 else {main=["英語","国語または数学","選択科目"];sub=["志望理由","基礎固め"];special=["得意科目型の方式選び"];}
 return {main,sub,special};
}

let resultSortMode="recommend";
function subjectProfile(){
 const p={};
 const pairs=[
   ["英語", Number(answers.eng||answers.english||answers.eigo||answers.devEng||0)],
   ["数学", Number(answers.math||answers.suugaku||answers.devMath||0)],
   ["国語", Number(answers.jp||answers.japanese||answers.kokugo||answers.devJp||0)],
   ["理科", Number(answers.science||answers.rika||answers.devSci||0)],
   ["社会", Number(answers.social||answers.shakai||answers.devSoc||0)],
   ["情報", Number(answers.info||answers.jouhou||0)]
 ];
 pairs.forEach(([k,v])=>{ if(v>0)p[k]=v; });
 return p;
}
function studentLevelGuess(){
 let base=levelNum();
 const sp=subjectProfile();
 const vals=Object.values(sp).filter(v=>v>0);
 if(vals.length){
   const avg=vals.reduce((a,b)=>a+b,0)/vals.length;
   base=Math.round((base*0.6)+(avg*0.4));
 }
 return base;
}
function universityRequiredSubjects(u){
 const f=(u.field+" "+(u.faculties||[]).join(" "));
 if(/医|看護|薬|保健|医療|歯|理|工|情報|建築|データ|科学|農|生命|機械|電気|化学/.test(f)) return ["英語","数学","理科"];
 if(/文|法|経済|経営|商|社会|政策|人文|外国語|国際|教育|心理/.test(f)) return ["英語","国語","社会"];
 if(/芸術|美術|音楽|デザイン|映像|マンガ|アニメ/.test(f)) return ["英語","国語"];
 return ["英語","国語または数学"];
}
function admissionProbability(u){
 const s=studentLevelGuess();
 const diff=s-u.level;
 let p=50 + diff*5;
 p += Math.min(10, Math.max(-6, matchScore(u)/10));
 if((u.area||"")===answers.area)p+=3;
 if((u.type||"")===answers.type)p+=3;
 p=Math.round(Math.max(5, Math.min(95,p)));
 return p;
}
function probabilityRankLabel(p){
 if(p>=80)return "A判定｜かなり有力";
 if(p>=65)return "B判定｜十分狙える";
 if(p>=45)return "C判定｜チャレンジ";
 if(p>=30)return "D判定｜要強化";
 return "E判定｜大きな挑戦";
}
function probabilityStars(p){
 const n=Math.max(1,Math.min(5,Math.ceil(p/20)));
 return "★".repeat(n)+"☆".repeat(5-n);
}
function improveAdvice(u){
 const p=admissionProbability(u);
 const req=universityRequiredSubjects(u);
 const sp=subjectProfile();
 const lacking=req.map(sub=>{
   const v=sp[sub]||studentLevelGuess();
   const need=Math.max(0, Math.round(u.level-v));
   return {sub,need};
 }).sort((a,b)=>b.need-a.need);
 const top=lacking[0]||{sub:"英語",need:3};
 const plus=Math.max(3, Math.min(12, top.need+3));
 const target=Math.min(95,p+12);
 return `最短ルート：${top.sub}をあと+${plus}目安で、推定${target}%を目指せます。`;
}

function sortResultList(list){
 const arr=[...list];
 if(resultSortMode==="prob") return arr.sort((a,b)=>admissionProbability(b)-admissionProbability(a));

 if(resultSortMode==="levelLow") return arr.sort((a,b)=>a.level-b.level);
 if(resultSortMode==="fit") return arr.sort((a,b)=>matchScore(b)-matchScore(a));
 if(resultSortMode==="career") return arr.sort((a,b)=>(employmentScore?employmentScore(b):0)-(employmentScore?employmentScore(a):0));

}

function estimatedCommonTestRate(u){let base=Math.round(u.level+10);let f=u.field+" "+u.faculties.join(" ");if(/国立|公立/.test(u.type))base+=4;if(/難関/.test(u.field))base+=6;if(/医|薬|看護|医療|歯/.test(f))base+=4;if(/芸術|美術|音楽|デザイン/.test(f))base-=4;return Math.max(48,Math.min(88,base))}
function estimated倍率(u){let f=u.field+" "+u.faculties.join(" ");let m=2.1;if(u.type==="私立")m+=0.5;if(/医|薬|看護|医療|歯/.test(f))m+=0.4;if(/国際|外国語|心理/.test(f))m+=0.3;if(u.level>=60)m+=0.4;return Math.round(m*10)/10}
function currentRate(){let lv=levelNum();return Math.max(45,Math.min(82,Math.round(lv+5)))}
function gapText(u){let need=estimatedCommonTestRate(u),now=currentRate(),gap=need-now;if(gap<=0)return `<span class="gapGood">到達圏内</span><br><span class="small">目安 ${now}% / 必要 ${need}%</span>`;if(gap<=8)return `<span class="gapMid">あと${gap}%</span><br><span class="small">現在 ${now}% / 必要 ${need}%</span>`;return `<span class="gapBad">あと${gap}%</span><br><span class="small">現在 ${now}% / 必要 ${need}%</span>`}
function strategySortList(list){let mode=document.getElementById("compareSort")?document.getElementById("compareSort").value:"選択順";let arr=[...list];if(mode==="共テ得点率が低い順")arr.sort((a,b)=>estimatedCommonTestRate(a)-estimatedCommonTestRate(b));if(mode==="倍率が低い順")arr.sort((a,b)=>estimated倍率(a)-estimated倍率(b));if(mode==="就職・キャリア順")arr.sort((a,b)=>employmentScore(b)-employmentScore(a));if(mode==="偏差値が高い順")arr.sort((a,b)=>b.level-a.level);if(mode==="合格可能性順")arr.sort((a,b)=>(ratings(b).chance-ratings(a).chance));return arr}
function compareSortControl(){return `<div class="compareSortBox noPrint"><label>比較表の並び替え</label><select id="compareSort" onchange="renderCompare()">${["選択順","合格可能性順","共テ得点率が低い順","倍率が低い順","就職・キャリア順","偏差値が高い順"].map(x=>`<option value="${x}">${x}</option>`).join("")}</select><p class="small">共テ得点率・倍率は面談用の目安表示です。正式な数値は大学公式・入試情報サイトで確認してください。</p></div>`}
function compareRows(){let list=strategySortList(selected.map(getU).filter(Boolean));if(!list.length)return `<p class="help">まだ大学が選ばれていません。診断結果や検索から大学を追加してください。</p>`;let rows=["所在地","偏差値目安","合格可能性目安","昨年度共テ得点率目安","昨年度倍率目安","現在との差分","主な学部","大学との相性","入試の現実度","就職・キャリア","将来の広がり","大学生活タイプ","主な就職分野","受験科目"];return `<div class="compareHint"><span>📊 ${list.length}校を比較中</span><span>横スクロールできます →</span></div><div class="compareWrap"><table class="compareTable"><tr><th>項目</th>${list.map(u=>"<th>"+esc(u.name)+"</th>").join("")}</tr>${rows.map(row=>`<tr><th>${row}</th>${list.map(u=>{let r=ratings(u);if(row==="所在地")return "<td>"+esc(u.area)+"<br>"+esc(u.pref)+"</td>";if(row==="偏差値目安")return "<td><span class='levelBadge'>"+u.level+"前後</span></td>";if(row==="合格可能性目安")return "<td><span class='levelBadge'>"+admissionChance(u)+"%</span><br>"+chanceJudge(admissionChance(u))+"<br><span class='small'>面談用の目安</span></td>";if(row==="昨年度共テ得点率目安")return "<td><span class='levelBadge'>"+estimatedCommonTestRate(u)+"%前後</span><br><span class='small'>学部・方式で変動</span></td>";if(row==="昨年度倍率目安")return "<td><span class='levelBadge'>"+estimated倍率(u)+"倍前後</span><br><span class='small'>方式で変動</span></td>";if(row==="現在との差分")return "<td>"+gapText(u)+"</td>";if(row==="主な学部")return "<td>"+u.faculties.slice(0,6).map(esc).join("<br>")+"</td>";if(row==="大学との相性")return "<td class='stars'>"+stars(r.fit)+"</td>";if(row==="入試の現実度")return "<td class='stars'>"+stars(r.chance)+"</td>";if(row==="就職・キャリア")return "<td><span class='stars'>"+stars(employmentScore(u))+"</span><br>"+employmentLabel(u)+"<br><span class='small'>"+employmentReason(u)+"</span></td>";if(row==="将来の広がり")return "<td class='stars'>"+stars(r.future)+"</td>";if(row==="大学生活タイプ")return "<td>"+campusLifeTypeHtml(u)+"</td>";if(row==="主な就職分野")return "<td>"+careerImage(u).slice(0,4).map(esc).join("<br>")+"</td>";if(row==="受験科目")return "<td><a class='miniLink miniPrimary' target='_blank' href='"+manabiUrl(u.name)+"'>受験科目を見る</a><br><a class='miniLink miniGold' target='_blank' href='"+officialExamUrl(u.name)+"'>公式募集要項</a></td>";return "<td></td>"}).join("")}</tr>`).join("")}</table></div>`}
function classifyCandidate(u){let gap=estimatedCommonTestRate(u)-currentRate();if(gap>=12)return"チャレンジ";if(gap>=4)return"実力相応";return"安全・併願"}
function bestByType(list,type){let arr=list.filter(u=>classifyCandidate(u)===type);if(!arr.length)return null;return arr.sort((a,b)=>employmentScore(b)-employmentScore(a)||matchScore(b)-matchScore(a))[0]}
function aiAdviceHtml(){let list=selected.map(getU).filter(Boolean);if(!list.length){return `<div class="aiAdvice"><h3>🤖 AI進路アドバイス</h3><p class="help">大学を比較に追加すると、ここに受験戦略アドバイスが表示されます。</p></div>`}let sorted=[...list].sort((a,b)=>matchScore(b)-matchScore(a));let top=sorted[0];let challenge=bestByType(list,"チャレンジ");let match=bestByType(list,"実力相応");let safety=bestByType(list,"安全・併願");let field=answers.track||"未定";let now=currentRate();let avgNeed=Math.round(list.reduce((s,u)=>s+estimatedCommonTestRate(u),0)/list.length);let privateCount=list.filter(u=>u.type==="私立").length;let publicCount=list.length-privateCount;let areas=[...new Set(list.map(u=>u.area))].join("・");let strong=list.slice().sort((a,b)=>employmentScore(b)-employmentScore(a))[0];let summary=`現在の候補は「${areas}」を中心に、${field}系の進路を考えやすい組み合わせです。現在の共テ目安を${now}%前後とすると、候補全体の必要得点率目安は平均${avgNeed}%前後です。まずは${esc(top.name)}を軸に、チャレンジ校・実力相応校・安全校を分けて考えると面談で整理しやすくなります。`;let balance=[];if(challenge)balance.push(`第一志望・チャレンジ：${challenge.name}`);if(match)balance.push(`実力相応：${match.name}`);if(safety)balance.push(`安全校・併願：${safety.name}`);if(!balance.length)balance.push(`${top.name}を中心に、もう1〜2校追加して比較すると判断しやすくなります。`);let caution=[];if(privateCount===list.length)caution.push("候補が私立中心です。学費や受験日程の重なりも確認しましょう。");if(publicCount===list.length)caution.push("候補が国公立中心です。共通テストで必要な科目数が多くなるため、早めに科目確認が必要です。");if(list.length<3)caution.push("比較大学が少なめです。チャレンジ・実力相応・安全校を最低1校ずつ入れると受験戦略が立てやすくなります。");if(avgNeed-now>=10)caution.push("必要得点率との差が大きめです。まずは英語・数学・国語など配点の大きい科目を優先して伸ばしましょう。");if(!caution.length)caution.push("候補のバランスは比較的良好です。次は受験科目と入試日程を確認しましょう。");let todo=[];if(field==="教育")todo=["教員志望か、教育関連企業も含めるかを決める","英語・国語・小論文の基礎を固める","教育学部の面接・志望理由を早めに言語化する"];else if(field==="医療")todo=["必要な理科科目を早めに確定する","英語・数学・理科を優先して学習時間を増やす","医療職を目指す理由を面接で話せるようにする"];else if(field==="理系")todo=["数学の苦手単元を洗い出す","理科の選択科目を確定する","工学・情報・理学など学部の違いを比較する"];else if(field==="国際")todo=["英単語・長文読解を毎日固定する","英検など資格利用入試も確認する","留学制度や語学教育の違いを比較する"];else todo=["英語を最優先で安定させる","志望学部ごとの受験科目を確認する","安全校を1〜2校追加して受験日程を組む"];return `<div class="aiAdvice"><h3>🤖 AI進路アドバイス</h3><div class="adviceBlock"><h4>総評</h4><p>${esc(summary)}</p></div><div class="adviceBlock"><h4>おすすめ併願パターン</h4><ul>${balance.map(x=>`<li>${esc(x)}</li>`).join("")}</ul></div><div class="adviceBlock"><h4>生徒が今やること</h4><ul>${todo.map(x=>`<li>${esc(x)}</li>`).join("")}</ul></div><div class="adviceBlock"><h4>注意点</h4><ul>${caution.map(x=>`<li>${esc(x)}</li>`).join("")}</ul></div><div class="adviceBlock"><h4>就職面で見るなら</h4><p>${esc(strong.name)}は、候補内では就職・キャリアが高めです。理由：${esc(employmentReason(strong))}</p></div><div class="aiNote">このコメントは、選択した大学・分野・偏差値目安・共テ得点率目安・就職・キャリアから自動生成しています。</div></div>`}

function compareAddPanel(){
 return `<div class="addPanel noPrint">
   <button class="addToggle" onclick="toggleAddPanel()">＋ 大学を追加</button>
   <div id="addPanelBody" class="addBody">
     <div class="grid three">
       <div><label>エリア</label><select id="cmpArea" onchange="updateComparePrefOptions();updateCompareUniversityOptions()">
         ${["すべて",...areaOptions].map(a=>`<option value="${a}" ${a==="中部"?"selected":""}>${a}</option>`).join("")}
       </select></div>
       <div><label>都道府県</label><select id="cmpPref" onchange="updateCompareUniversityOptions()"></select></div>
       <div><label>大学</label><select id="cmpUniversity"></select></div>
     </div>
     <div class="actions">
       <button class="btn green" onclick="addCompareSelectedUniversity()">追加</button>
       <button class="btn primary" onclick="renderStrategy()">面談PDFへ</button>
       <button class="btn gray" onclick="selected=[];renderCompare()">選択リセット</button>

 </div>`;

function toggleAddPanel(){
 const body=document.getElementById("addPanelBody");
 if(!body)return;
 body.classList.toggle("open");
 if(body.classList.contains("open")){
   updateComparePrefOptions();
   updateCompareUniversityOptions();
 }
}
function selectedChipsHtml(){
 if(!selected.length)return `<span class="small">まだ比較大学が選ばれていません。</span>`;
 return selected.map(n=>`<span class="selectedChip">${esc(n)} <button onclick="removeSelected('${esc(n)}')">×</button></span>`).join("");
}
function removeSelected(name){
 selected=selected.filter(x=>x!==name);
 renderCompare();
}
function updateComparePrefOptions(){
 const areaSel=document.getElementById("cmpArea");
 const prefSel=document.getElementById("cmpPref");
 if(!areaSel||!prefSel)return;
 const area=areaSel.value;
 let prefs=[...new Set(universities.filter(u=>area==="すべて"||u.area===area).map(u=>u.pref))].sort();
 prefs=["すべて",...prefs];
 prefSel.innerHTML=prefs.map(p=>`<option value="${p}">${p}</option>`).join("");
}
function updateCompareUniversityOptions(){
 const areaSel=document.getElementById("cmpArea");
 const prefSel=document.getElementById("cmpPref");
 const uniSel=document.getElementById("cmpUniversity");
 if(!areaSel||!prefSel||!uniSel)return;
 const area=areaSel.value;
 const pref=prefSel.value||"すべて";
 let list=universities.filter(u=>(area==="すべて"||u.area===area)&&(pref==="すべて"||u.pref===pref));
 list=list.sort((a,b)=>b.level-a.level||a.name.localeCompare(b.name,"ja")).slice(0,200);
 if(!list.length){
   uniSel.innerHTML=`<option value="">候補なし</option>`;
   return;
 }
 uniSel.innerHTML=list.map(u=>`<option value="${esc(u.name)}">${esc(u.name)}｜${esc(u.type)}｜偏差値${u.level}前後</option>`).join("");
}
function addCompareSelectedUniversity(){
 const uniSel=document.getElementById("cmpUniversity");
 if(!uniSel||!uniSel.value)return;
 addSelected(uniSel.value);
 renderCompare();
 setTimeout(()=>{
   const body=document.getElementById("addPanelBody");
   if(body){
     body.classList.add("open");
     updateComparePrefOptions();
     updateCompareUniversityOptions();
   }
 },0);
}

function renderCompare(){$("app").innerHTML=`<div class="card"><h2>比較</h2>${meetingModeBarHtml()}${sourceNoteHtml()}<p>「＋大学を追加」から、エリア・都道府県・大学を選んで比較に追加できます。</p>${compareAddPanel()}<div class="box">${compareSortControl()}${compareRows()}</div>${aiAdviceHtml()}${sheetSaveBox()}</div>`}

function selectedCards(){let list=selected.map(getU).filter(Boolean);if(!list.length)return"<p class='help'>比較に追加した大学がここに表示されます。</p>";return list.map(u=>`<div class="box"><h3>${esc(u.name)}</h3><p class="small">${esc(u.area)}／${esc(u.pref)}／${esc(u.field)}</p>${chanceHtml(u)}<div class="hitBox">偏差値目安：${u.level}前後<br>昨年度共テ得点率目安：${estimatedCommonTestRate(u)}%前後<br>昨年度倍率目安：${estimated倍率(u)}倍前後<br>現在との差分：${gapText(u)}</div><h3>主な学部</h3>${facultyChips(u)}<div class="starGrid"><div class="starRow"><span>相性</span><span class="stars">${stars(ratings(u).fit)}</span></div><div class="starRow"><span>現実度</span><span class="stars">${stars(ratings(u).chance)}</span></div></div><div class="employBox">就職・キャリア：${stars(employmentScore(u))}　${employmentLabel(u)}<br>${employmentReason(u)}</div>${careerTypeHtml(u)}${campusLifeTypeHtml(u)}${studyPlanShortHtml(u)}<p><strong>主な就職分野</strong></p><ul>${careerImage(u).map(x=>"<li>"+esc(x)+"</li>").join("")}</ul><div class="actions"><a class="btn primary" target="_blank" href="${manabiUrl(u.name)}">受験科目</a><a class="btn gold" target="_blank" href="${careerUrl(u.name)}">就職実績</a></div></div>`).join("")}

function renderStrategy(){$("app").innerHTML=`<div class="card">${printHeaderHtml()}<div class="printTitle">面談サポート・進路戦略シート</div><h2>面談サポート・進路戦略</h2>${meetingModeBarHtml()}${printPdfGuideHtml()}<div class="grid three"><div><label>生徒名</label><input id="name" value="${esc(student.name)}"></div><div><label>高校名</label><input id="school" value="${esc(student.school)}"></div><div><label>学年</label><input id="grade" value="${esc(student.grade||answers.grade||"")}"></div><div><label>担当講師</label><input id="teacher" value="${esc(student.teacher)}"></div><div><label>面談日</label><input id="date" value="${esc(student.date||today())}"></div><div><label>志望メモ</label><input id="goal" value="${esc(student.goal)}"></div></div>${printSummaryHtml()}<div class="box"><h3>候補大学 比較表</h3>${compareRows()}</div>${printTaskHtml()}${aiAdviceHtml()}${sheetSaveBox()}<div class="grid two">${selectedCards()}</div><div class="grid two"><div class="box"><h3>面談メモ</h3><textarea id="memo">${esc(student.memo)}</textarea></div><div class="box"><h3>次回までの課題</h3><textarea id="action">${esc(student.action)}</textarea></div></div><div class="actions noPrint"><button class="btn primary" onclick="saveRecord()">保存</button><button class="btn navy" onclick="window.print()">印刷・PDF保存</button><button class="btn gray" onclick="renderCompare()">比較へ</button><button class="btn gray" onclick="renderHome()">ホーム</button></div></div>`;scrollTo(0,0)}
function getAdvicePlainText(){let list=selected.map(getU).filter(Boolean);if(!list.length)return"比較大学が未選択です。";let top=[...list].sort((a,b)=>matchScore(b)-matchScore(a))[0];let now=currentRate();let avgNeed=Math.round(list.reduce((s,u)=>s+estimatedCommonTestRate(u),0)/list.length);return `候補大学は${list.map(u=>u.name).join("、")}です。現在の共テ目安は${now}%前後、候補全体の必要得点率目安は平均${avgNeed}%前後です。${top.name}を軸に、チャレンジ・実力相応・安全校を分けて受験戦略を立てるとよいです。`}
function makeSheetPayload(){collect();let list=selected.map(getU).filter(Boolean);return{timestamp:new Date().toLocaleString("ja-JP"),studentName:student.name||"",school:student.school||"",grade:student.grade||answers.grade||"",teacher:student.teacher||"",interviewDate:student.date||"",residence:answers.residence||"",field:answers.track||"",level:answers.level||"",areas:(answers.areas||[]).join("・"),commute:answers.commute||"",kind:answers.kind||"",selectedUniversities:list.map(u=>u.name).join("、"),universityDetails:list.map(u=>`${u.name}｜${u.type}｜${u.area}｜${u.pref}｜偏差値${u.level}前後｜共テ${estimatedCommonTestRate(u)}%前後｜倍率${estimated倍率(u)}倍前後｜合格可能性目安${admissionChance(u)}%｜就職・キャリア${employmentLabel(u)}`).join("\n"),aiAdvice:getAdvicePlainText(),memo:student.memo||"",action:student.action||"",deepAverage:(typeof deepAverage==="function"?deepAverage():""),deepScores:answers.deepScores?JSON.stringify(answers.deepScores):"",deepField:answers.deepField||"",deepAdvice:(typeof deepAdviceText==="function"?deepAdviceText():""),pageUrl:location.href}}
function getSheetUrl(){return localStorage.getItem("sheet_webapp_url")||""}
function setSheetUrl(){const current=getSheetUrl();const url=prompt("Google Apps ScriptのWebアプリURLを入力してください",current);if(url!==null){localStorage.setItem("sheet_webapp_url",url.trim());alert("保存先URLを設定しました。")}}
async function sendToSheet(){const url=getSheetUrl();const status=document.getElementById("sheetStatus");if(!url){if(status)status.innerHTML='<span class="sheetNg">先に「保存先URLを設定」を押してください。</span>';return}const payload=makeSheetPayload();try{if(status)status.innerHTML='送信中...';await fetch(url,{method:"POST",mode:"no-cors",headers:{"Content-Type":"text/plain;charset=utf-8"},body:JSON.stringify(payload)});if(status)status.innerHTML='<span class="sheetOk">スプレッドシートへ送信しました。</span>'}catch(e){if(status)status.innerHTML='<span class="sheetNg">送信できませんでした。URLや公開設定を確認してください。</span>'}}
function sheetSaveBox(){return `<div class="sheetBox noPrint"><h3>📗 スプレッドシート保存</h3><p class="small">面談サポート・比較大学・面談アドバイスをGoogleスプレッドシートに送信できます。初回だけ保存先URLを設定してください。</p><div class="actions"><button class="btn gray" onclick="setSheetUrl()">保存先URLを設定</button><button class="btn green" onclick="sendToSheet()">スプレッドシートに保存</button></div><div id="sheetStatus" class="sheetStatus"></div></div>`}
function saveRecord(){collect();let arr=JSON.parse(localStorage.getItem("univ_nav_records_v2")||"[]");arr.unshift({id:Date.now(),student,answers,selected,date:new Date().toISOString()});localStorage.setItem("univ_nav_records_v2",JSON.stringify(arr.slice(0,80)));alert("保存しました")}
renderHome();
</script>

  {icon:"🌱", title:"可能性診断", desc:"強みや興味から進路を広げます。", action:"renderAptitudeEngine", wide:false},

function v5RunAction(actionName,title){
  if(title && typeof addRecentAction==="function") addRecentAction(title, actionName);
  const fn=window[actionName];
  if(typeof fn==="function") fn();
  else alert("この機能は準備中です。");
}

function v5HomeButtons(){
  return `<div class="v5Grid">${NAV_ITEMS.map(item=>`
    <div class="v5Card ${item.wide?"wide":""}" onclick="v5RunAction('${item.action}','${item.title}')">
      <div class="v5Icon">${item.icon}</div>
      <h3>${item.title}</h3>
      <p>${item.desc}</p>
    </div>`).join("")}</div>`;
}

function v5MenuButtons(){
  return NAV_ITEMS.map(item=>`
    <button class="v5MenuBtn" onclick="closeQuickNav();v5RunAction('${item.action}','${item.title}')">${item.icon} ${item.title}</button>
  `).join("");
}

function renderHomeV5(){
  document.getElementById("app").innerHTML=`<div class="card">

    <div class="qualityHero">
      <h1>🎓 進学コンパス</h1>

        <button onclick="homeSearchRun()">検索</button>

    ${typeof recentHtml==="function"?recentHtml():""}
  </div>`;
  scrollTo(0,0);

function openQuickNav(){
  let overlay=document.getElementById("v5MenuOverlay");
  if(!overlay){
    overlay=document.createElement("div");
    overlay.id="v5MenuOverlay";
    overlay.className="v5MenuOverlay";
    overlay.innerHTML=`<div class="v5MenuPanel">
      <button class="v5MenuClose" onclick="closeQuickNav()">閉じる</button>
      <h3>メニュー</h3>
      <div id="v5MenuButtons"></div>
    </div>`;
    document.body.appendChild(overlay);
    overlay.addEventListener("click",e=>{if(e.target===overlay)closeQuickNav();});
  }
  document.getElementById("v5MenuButtons").innerHTML=v5MenuButtons();
  overlay.classList.add("open");
}

function closeQuickNav(){
  const overlay=document.getElementById("v5MenuOverlay");
  if(overlay) overlay.classList.remove("open");
}

function renderHome(){renderHomeV5();}
function renderHomeQuality(){renderHomeV5();}
function renderHomeV3(){renderHomeV5();}
function renderFutureHome(){renderHomeV5();}



function ensureFixedMenuButton(){
  let btn=document.getElementById("v5FixedMenuButton");
  if(!btn){
    btn=document.createElement("button");
    btn.id="v5FixedMenuButton";
    btn.className="v5FixedMenuButton noPrint";
    btn.innerHTML="☰ メニュー";
    btn.onclick=function(){openQuickNav();};
    document.body.appendChild(btn);
  }
}
document.addEventListener("DOMContentLoaded", ensureFixedMenuButton);
setTimeout(ensureFixedMenuButton,300);
