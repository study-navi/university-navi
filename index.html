<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
  <title>進学コンパス｜Ver.13 UI・役割別ナビ・生徒ログイン改善版</title>
  <link rel="stylesheet" href="./css/style.css">
</head>
<body>
  <div id="opening" class="opening">
    <div class="openingCard">
      
<div class="openingCompassFixed" aria-label="コンパス">
  <div class="compassDial">
    <span class="compassN">N</span>
    <span class="compassNeedle"></span>
    <span class="compassCenter"></span>
  </div>
</div>

      <h1>進学コンパス</h1>
      <p>未来の自分を見つけよう。</p>
      <div class="loadingBar"><span></span></div>
      <div class="loadingChecks">
        <div>✔ AI進路診断を準備中</div>
        <div>✔ 大学データを読み込み中</div>
        <div>✔ 公式確認データを確認中</div>
        <div>✔ お気に入りを復元中</div>
      </div>
      <button onclick="SC.skipOpening()">スキップ</button>
    </div>
  </div>

  <header class="topbar">
    <button id="roleSwitchBtn" class="topMenu" onclick="SC.renderRoleSelect()">← ユーザー選択</button>
    <div class="brand">
      <img src="./assets/compass_star_simple.png" onerror="this.style.display='none'">
      <span>進学コンパス</span>
    </div>
    <button class="topMenu" onclick="SC.openMenu()">☰ メニュー</button>
  </header>
<main id="app" class="app"></main>

  <nav class="bottomNav">
    <button onclick="SC.go('home')">🏠<span>ホーム</span></button>
    <button onclick="SC.go('dream')">💭<span>夢・好き</span></button>
    <button onclick="SC.go('search')">🔍<span>検索</span></button>
    <button onclick="SC.go('ai')">🤖<span>AI</span></button>
    <button onclick="SC.openMenu()">☰<span>メニュー</span></button>
  </nav>

  <div id="menuOverlay" class="menuOverlay" onclick="SC.closeMenu(event)">
    <div class="menuPanel">
      <h2>メニュー</h2>
      <button onclick="SC.go('home')">🏠 ホーム</button>
      <button onclick="SC.go('search')">🔍 大学検索</button>
      <button onclick="SC.go('dream')">💭 夢・好きから探す</button>
      <button onclick="SC.go('possibility')">📈 可能性診断</button>
      <button onclick="SC.go('ai')">🤖 AI進路診断</button>
      <button onclick="SC.go('compare')">📊 大学比較</button>
      <button onclick="SC.go('favorites')">♥ お気に入り</button>
      <button onclick="SC.go('official')">🛡️ 公式確認進捗</button>
      <button onclick="SC.renderLogin()">🔐 ログイン</button>
      <button onclick="SC.renderTeacherDashboard()">👨‍🏫 先生画面</button>
      <button onclick="SC.renderStudentDashboard()">🎓 生徒画面</button>
      <button onclick="SC.showTutorial(true)">📘 使い方を見る</button>
      <button onclick="SC.renderWelcome()">🎓 スタート画面</button>
      <button onclick="SC.closeMenu()">閉じる</button>
    </div>
  </div>

  <div id="tutorial" class="tutorial">
    <div class="tutorialCard">
      <div id="tutorialBody"></div>
      <div class="actions">
        <button class="btn light" onclick="SC.tutorialPrev()">戻る</button>
        <button class="btn" onclick="SC.tutorialNext()">次へ</button>
      </div>
    </div>
  </div>

  <script src="./data/universities.js"></script>
  <script src="./js/state.js"></script>
  <script src="./js/opening.js"></script>
  <script src="./js/home.js"></script>
  <script src="./js/search.js"></script>
  <script src="./js/dream.js"></script>
  <script src="./js/possibility.js"></script>
  <script src="./js/ai.js"></script>
  <script src="./js/compare.js"></script>
  <script src="./js/favorites.js"></script>
  <script src="./js/tutorial.js"></script>
  <script type="module" src="./js/firebase.js"></script>
  <script type="module" src="./js/auth.js"></script>
  <script type="module" src="./js/teacher.js"></script>
  <script type="module" src="./js/student.js"></script>
  <script type="module" src="./js/study.js"></script>
  <script src="./js/app.js"></script>
  <script type="module" src="./js/role-ui.js"></script>
  <script type="module" src="./js/welcome.js"></script>
</body>
</html>
