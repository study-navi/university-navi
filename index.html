<style>
:root{
  --navy:#143b73;
  --blue:#2563eb;
  --sky:#eaf3ff;
  --line:#dbe7f6;
  --muted:#64748b;
  --gold:#fff4c7;
  --goldText:#795200;
  --green:#16a34a;
  --bg:#f4f8fd;
}
*{box-sizing:border-box}
html,body{margin:0;padding:0;font-family:-apple-system,BlinkMacSystemFont,"Hiragino Sans","Yu Gothic",Meiryo,sans-serif;background:var(--bg);color:#0f172a}
body{padding-bottom:env(safe-area-inset-bottom)}
header{
  background:linear-gradient(135deg,#123a73,#2563eb);
  color:white;
  padding:18px 16px 22px;
  text-align:center;
}
header .school{font-size:13px;opacity:.92;font-weight:800}
header h1{margin:5px 0 3px;font-size:25px;letter-spacing:.04em}
header p{margin:0;color:#eaf3ff;font-size:13px;font-weight:800}
main{max-width:1040px;margin:0 auto;padding:14px}
.card{
  background:white;
  border:1px solid var(--line);
  border-radius:24px;
  padding:18px;
  box-shadow:0 10px 28px rgba(20,59,115,.07);
  margin:12px 0;
}
.hero{
  background:linear-gradient(135deg,#0f2f5f,#163f7c 55%,#2563eb);
  color:white;
  border-radius:28px;
  padding:22px 18px;
  box-shadow:0 18px 42px rgba(15,47,95,.23);
}
.hero h2{font-size:29px;margin:0 0 6px;color:white}
.hero .copy{font-size:15px;font-weight:900;color:white;margin:0 0 10px}
.badge{
  display:inline-block;
  background:var(--gold);
  color:var(--goldText);
  border:1px solid #ffd166;
  border-radius:999px;
  padding:8px 12px;
  font-size:12px;
  font-weight:900;
  cursor:pointer;
}
.searchBox{
  display:flex;
  gap:8px;
  margin-top:14px;
  background:white;
  border-radius:18px;
  padding:8px;
}
.searchBox input{flex:1;border:0;outline:0;padding:10px;font-size:14px;min-width:0}
.searchBox button,.btn{
  border:0;border-radius:999px;background:var(--navy);color:white;font-weight:900;
  padding:10px 14px;cursor:pointer;font-size:13px;
}
.btn.gray{background:#eef6ff;color:var(--navy)}
.btn.green{background:#ecfdf3;color:#087443;border:1px solid #abe7c3}
.btn.gold{background:#fff5d7;color:#795200;border:1px solid #ffd166}
.note{text-align:center;color:var(--muted);font-size:12px;font-weight:800;margin:12px 0}
.grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin:14px 0}
@media(min-width:760px){.grid{grid-template-columns:repeat(3,1fr)}}
.navCard{
  background:white;border:1px solid var(--line);border-radius:22px;padding:16px 12px;
  cursor:pointer;box-shadow:0 8px 22px rgba(20,59,115,.07);text-align:left;
}
.navCard:hover{border-color:var(--blue);background:#f8fbff}
.navCard.wide{grid-column:1/-1}
@media(min-width:760px){.navCard.wide{grid-column:auto}}
.navIcon{font-size:29px;margin-bottom:5px}
.navCard h3{margin:0 0 5px;color:var(--navy);font-size:16px}
.navCard p{margin:0;color:var(--muted);font-size:12px;line-height:1.55;font-weight:700}
.fixedMenu{
  position:fixed;right:14px;top:12px;z-index:10020;
  border:0;border-radius:999px;background:white;color:var(--navy);
  padding:10px 16px;font-weight:900;font-size:14px;
  box-shadow:0 10px 24px rgba(15,23,42,.18);cursor:pointer;
}
.menuOverlay{display:none;position:fixed;inset:0;z-index:10030;background:rgba(15,23,42,.12)}
.menuOverlay.open{display:block}
.menuPanel{
  position:fixed;right:18px;top:64px;width:min(340px,calc(100vw - 36px));
  background:white;border:1px solid var(--line);border-radius:24px;padding:18px;
  box-shadow:0 22px 48px rgba(15,23,42,.22);
}
.menuPanel h3{margin:0 0 10px;color:var(--navy)}
.menuClose{float:right;border:0;border-radius:999px;padding:8px 11px;background:#eef6ff;color:var(--navy);font-weight:900}
.menuBtn{
  display:block;width:100%;border:0;background:white;color:var(--navy);text-align:left;
  font-size:15px;font-weight:900;padding:11px 8px;border-radius:14px;cursor:pointer;
}
.menuBtn:hover{background:#eef6ff}
h2{color:var(--navy);margin:0 0 10px}
h3{color:var(--navy)}
label{display:block;font-size:13px;font-weight:900;color:var(--navy);margin:10px 0 5px}
input,select,textarea{
  width:100%;border:1px solid var(--line);border-radius:14px;padding:11px;font-size:16px;background:white;
}
.actions{display:grid;grid-template-columns:1fr;gap:8px;margin-top:12px}
@media(min-width:760px){.actions{grid-template-columns:repeat(2,1fr)}}
.pill{display:inline-block;border-radius:999px;background:#eef6ff;color:var(--navy);padding:6px 10px;font-size:12px;font-weight:900;margin:3px}
.uni{
  border:1px solid var(--line);border-radius:20px;padding:14px;margin:10px 0;background:white;
}
.uniTop{display:flex;justify-content:space-between;gap:10px;align-items:flex-start}
.uni strong{font-size:17px;color:var(--navy)}
.small{font-size:12px;color:var(--muted);line-height:1.6}
.probBox{background:linear-gradient(135deg,#f0fdf4,#fff);border:1px solid #86efac;border-radius:16px;padding:11px;margin:9px 0}
.probMain{display:flex;justify-content:space-between;align-items:center}
.probMain b{color:#166534}.probPct{font-size:24px;font-weight:900;color:#166534}
.rank{display:inline-block;border-radius:999px;background:#ecfdf3;border:1px solid #abe7c3;color:#087443;font-size:12px;font-weight:900;padding:5px 9px}
.improve{background:#fffaf0;border:1px solid #ffd166;color:#795200;border-radius:12px;padding:8px;margin-top:8px;font-size:12px;line-height:1.6;font-weight:800}
.sortBar{background:#fbfdff;border:1px solid var(--line);border-radius:18px;padding:12px;margin:10px 0}
.sortBtns{display:flex;flex-wrap:wrap;gap:7px}
.sortBtn{border:1px solid #bfd7ff;background:#eaf3ff;color:var(--navy);border-radius:999px;padding:7px 10px;font-size:12px;font-weight:900}
.sortBtn.on{background:var(--navy);color:white}
.chips{display:flex;flex-wrap:wrap;gap:6px;margin:8px 0}
.tag{border:1px solid #fed7aa;background:#fff7ed;color:#9a3412;border-radius:999px;padding:7px 10px;font-size:12px;font-weight:900;cursor:pointer}
.tag.on{background:#ffedd5;border-color:#f97316}
.route{border:1px solid var(--line);border-radius:18px;padding:13px;margin:10px 0;background:#fbfdff}
.footerCopy{text-align:center;color:var(--muted);font-weight:900;margin:12px 0}
.warning{background:#fffaf0;border:1px solid #ffd166;color:#795200;border-radius:16px;padding:12px;margin:10px 0;font-size:13px;line-height:1.7;font-weight:800}
@media print{
  header,.fixedMenu,.menuOverlay,.noPrint{display:none!important}
  body{background:white}
  .card,.uni{box-shadow:none;border-color:#ddd}
}

/* 進学コンパス6.1 オープニング */
.splash{
  position:fixed;
  inset:0;
  z-index:20000;
  display:flex;
  align-items:center;
  justify-content:center;
  background:linear-gradient(135deg,#0f2f5f,#143b73 55%,#2563eb);
  color:white;
  overflow:hidden;
}
.splash::before{
  content:"";
  position:absolute;
  width:260px;
  height:260px;
  border-radius:999px;
  background:rgba(255,255,255,.10);
  top:-70px;
  right:-70px;
}
.splash::after{
  content:"";
  position:absolute;
  width:220px;
  height:220px;
  border-radius:999px;
  background:rgba(255,209,102,.16);
  bottom:-60px;
  left:-60px;
}
.splashInner{
  position:relative;
  text-align:center;
  padding:28px;
  animation:splashIn .8s ease both;
}
.splashLogo{
  font-size:54px;
  margin-bottom:8px;
}
.splashTitle{
  font-size:31px;
  font-weight:900;
  letter-spacing:.08em;
}
.splashCopy{
  margin-top:12px;
  font-size:15px;
  font-weight:900;
  color:#eaf3ff;
}
.splashBadge{
  display:inline-block;
  margin-top:18px;
  padding:8px 13px;
  border-radius:999px;
  background:#fff4c7;
  border:1px solid #ffd166;
  color:#795200;
  font-size:12px;
  font-weight:900;
}
.splashLine{
  width:0;
  height:3px;
  border-radius:999px;
  background:#ffd166;
  margin:18px auto 0;
  animation:splashLine 1.2s ease .6s forwards;
}
.splash.fadeOut{
  animation:splashOut .55s ease forwards;
}
@keyframes splashIn{
  from{opacity:0;transform:translateY(12px) scale(.98)}
  to{opacity:1;transform:translateY(0) scale(1)}
}
@keyframes splashLine{
  to{width:180px}
}
@keyframes splashOut{
  to{opacity:0;visibility:hidden}
}
.skipSplash{
  position:absolute;
  right:16px;
  bottom:18px;
  border:1px solid rgba(255,255,255,.35);
  background:rgba(255,255,255,.12);
  color:white;
  border-radius:999px;
  padding:8px 12px;
  font-weight:900;
  cursor:pointer;
}


/* 進学コンパス6.1 ホームボタン復活 */
.fixedHome{
  position:fixed;
  left:14px;
  top:12px;
  z-index:10020;
  border:0;
  border-radius:999px;
  background:white;
  color:#143b73;
  padding:10px 14px;
  font-weight:900;
  font-size:14px;
  box-shadow:0 10px 24px rgba(15,23,42,.18);
  cursor:pointer;
}
.fixedHome:hover{background:#eef6ff}
@media print{.fixedHome{display:none!important}}


/* Ver6.1 公式対応データ構造 */
.officialMini{
  background:#f8fbff;
  border:1px solid #bfd7ff;
  border-radius:14px;
  padding:9px;
  margin:8px 0;
  font-size:12px;
  line-height:1.6;
  color:#334155;
  font-weight:800;
}
.officialMini strong{color:#143b73}
.qualityState{
  display:inline-block;
  border-radius:999px;
  padding:5px 9px;
  font-size:11px;
  font-weight:900;
  background:#f1f5f9;
  color:#475569;
  border:1px solid #cbd5e1;
  margin:2px;
}
.qualityState.ok{background:#ecfdf3;color:#087443;border-color:#abe7c3}
.qualityState.warn{background:#fffaf0;color:#795200;border-color:#ffd166}

/* Ver7.2 データ品質メーター */
.qualityMeterBox{
  background:linear-gradient(135deg,#f8fbff,#ffffff);
  border:1px solid #bfd7ff;
  border-radius:20px;
  padding:14px;
  margin:12px 0;
}
.qualityMeterRow{
  display:grid;
  grid-template-columns:96px 1fr 48px;
  gap:8px;
  align-items:center;
  margin:8px 0;
  font-size:13px;
  font-weight:900;
  color:#143b73;
}
.qualityBar{
  height:12px;
  border-radius:999px;
  background:#e2e8f0;
  overflow:hidden;
}
.qualityBar span{
  display:block;
  height:100%;
  border-radius:999px;
  background:#94a3b8;
}
.qualityBar.a span{background:#16a34a}
.qualityBar.b span{background:#eab308}
.qualityBar.c span{background:#38bdf8}
.qualityBar.d span{background:#94a3b8}
.qualityBadgeA,.qualityBadgeB,.qualityBadgeC,.qualityBadgeD{
  display:inline-block;
  border-radius:999px;
  padding:5px 9px;
  font-size:11px;
  font-weight:900;
  margin:2px;
}
.qualityBadgeA{background:#ecfdf3;color:#087443;border:1px solid #abe7c3}
.qualityBadgeB{background:#fffaf0;color:#795200;border:1px solid #ffd166}
.qualityBadgeC{background:#e0f2fe;color:#075985;border:1px solid #7dd3fc}
.qualityBadgeD{background:#f1f5f9;color:#475569;border:1px solid #cbd5e1}
.qualityAdminTable{
  width:100%;
  border-collapse:separate;
  border-spacing:0 8px;
}
.qualityAdminTable th{
  text-align:left;
  color:#143b73;
  font-size:12px;
}
.qualityAdminTable td{
  background:white;
  border-top:1px solid #dbe7f6;
  border-bottom:1px solid #dbe7f6;
  padding:10px 8px;
  font-size:12px;
}
.qualityAdminTable td:first-child{border-left:1px solid #dbe7f6;border-radius:12px 0 0 12px}
.qualityAdminTable td:last-child{border-right:1px solid #dbe7f6;border-radius:0 12px 12px 0}

function matchScore(u){
  let s=0;
  const text=(u.name+u.field+u.faculties.join(""));
  const interests=(state.interests||[]);
  interests.forEach(k=>{if(text.includes(k))s+=8});
  if(state.area && u.area===state.area)s+=8;
  if(state.type && u.type===state.type)s+=5;
  return s+50;
}
function level(){return Number(state.scores.level||55)}
function probability(u){
  let p=50+(level()-u.level)*5+(matchScore(u)-50)/4;
  return Math.max(5,Math.min(95,Math.round(p)));
}
function rank(p){if(p>=80)return"A判定｜かなり有力";if(p>=65)return"B判定｜十分狙える";if(p>=45)return"C判定｜チャレンジ";if(p>=30)return"D判定｜要強化";return"E判定｜大きな挑戦"}
function stars(p){const n=Math.max(1,Math.min(5,Math.ceil(p/20)));return"★".repeat(n)+"☆".repeat(5-n)}
function required(u){const t=u.field+u.faculties.join("");if(/医|看護|薬|工|情報|理|建築|農|生命/.test(t))return["数学","英語","理科"];if(/芸術|美術|音楽|デザイン/.test(t))return["英語","国語"];return["英語","国語","社会"]}
function improve(u){const req=required(u);let sub=req[0];if(req.includes("数学")&&state.scores.math<u.level)sub="数学";else if(req.includes("英語")&&state.scores.eng<u.level)sub="英語";const plus=Math.max(3,Math.min(12,Math.round(u.level-level()+5)));return `${sub}をあと+${plus}目安で、合格可能性アップを狙えます。`}
function sortList(list){
 const a=[...list];
 if(state.sort==="prob")return a.sort((x,y)=>probability(y)-probability(x));
 if(state.sort==="fit")return a.sort((x,y)=>matchScore(y)-matchScore(x));
 if(state.sort==="safe")return a.sort((x,y)=>x.level-y.level);
 if(state.sort==="hard")return a.sort((x,y)=>y.level-x.level);
 if(state.sort==="career")return a.sort((x,y)=>y.career-x.career);
 return a.sort((x,y)=>(matchScore(y)+probability(y))-(matchScore(x)+probability(x)));
}

function getUserMode(){
  return localStorage.getItem("shingakuUserMode_v73") || "";
}
function setUserMode(mode){
  localStorage.setItem("shingakuUserMode_v73", mode);
  renderHome();
}
function resetUserMode(){
  localStorage.removeItem("shingakuUserMode_v73");
  renderModeSelect();
}
function modeItems(){
  const mode = getUserMode();
  return (USER_MODES[mode] || USER_MODES.student).items;
}
function currentMode(){
  const mode = getUserMode();
  return USER_MODES[mode] || USER_MODES.student;
}
function modeClass(){
  return currentMode().className || "";
}
function modeBarHtml(){
  const m=currentMode();
  return `<div class="modeBar">
    <strong>${m.icon} ${m.title}モード</strong>
    <button class="modeChange" onclick="resetUserMode()">変更</button>
  </div>`;
}
function renderModeSelect(){
  document.getElementById("app").className = "";
  document.getElementById("app").innerHTML=`<div class="card">
    <div class="modeSelectHero">
      <h2>🎓 進学コンパス</h2>
      <p>あなたはどちらですか？</p>
    </div>
    <div class="modeGrid">
      <div class="modeCard" onclick="setUserMode('student')">
        <div class="modeIcon">🌱</div>
        <h3>高校生</h3>
        <p>好きなこと・将来の興味から、大学や学部を気軽に探します。</p>
        <span class="modePill">夢・好き</span><span class="modePill">可能性診断</span>
      </div>
      <div class="modeCard" onclick="setUserMode('teacher')">
        <div class="modeIcon">👨‍🏫</div>
        <h3>先生</h3>
        <p>面談・比較・公式データ確認など、進路指導で使いやすい画面です。</p>
        <span class="modePill">面談</span><span class="modePill">品質管理</span>
      </div>
      <div class="modeCard" onclick="setUserMode('parent')">
        <div class="modeIcon">👨‍👩‍👧</div>
        <h3>保護者</h3>
        <p>大学の特徴、比較、情報の信頼性を安心して確認できます。</p>
        <span class="modePill">比較</span><span class="modePill">品質保証</span>
      </div>
    </div>
    <div class="footerCopy">あとからいつでも変更できます。</div>
  </div>`;
  scrollTo(0,0);
}
function runModeAction(action){
  if(window[action]) window[action]();
  else alert("準備中です");
}
function renderModeHome(){
  const mode=getUserMode();
  if(!mode){renderModeSelect();return;}
  const m=currentMode();
  const items=modeItems();
  const app=document.getElementById("app");
  app.className=m.className || "";
  app.innerHTML=`<div class="card">
    <div class="hero">
      <h2>🎓 進学コンパス</h2>
      <div class="copy">${m.copy}</div>
      <span class="badge" onclick="renderQuality()">🛡️ 公式データベース対応</span>
      <div class="searchBox">
        <input id="homeQ" placeholder="大学・学部・職業・興味を検索" onkeydown="if(event.key==='Enter')homeSearch()">
        <button onclick="homeSearch()">検索</button>
      </div>
    </div>
    ${modeBarHtml()}
    <div class="grid">
      ${items.map(i=>`<div class="navCard ${i.wide?'wide':''}" onclick="runModeAction('${i.action}')"><div class="navIcon">${i.icon}</div><h3>${i.title}</h3><p>${i.desc}</p></div>`).join("")}
    </div>
    <div class="footerCopy">あなたの未来は、一つではありません。</div>
  </div>`;
  scrollTo(0,0);
}
function openMenu(){
  const mode=getUserMode();
  const buttons = mode
    ? `<button class="menuBtn" onclick="closeMenu();renderHome()">🏠 ホーム</button>`+
      modeItems().map(i=>`<button class="menuBtn" onclick="closeMenu();runModeAction('${i.action}')">${i.icon} ${i.title}</button>`).join("")+
      `<button class="menuBtn" onclick="closeMenu();resetUserMode()">🔁 モード変更</button>`
    : `<button class="menuBtn" onclick="closeMenu();renderModeSelect()">🏠 モード選択</button>`;
  document.getElementById("menuButtons").innerHTML=buttons;
  document.getElementById("menuOverlay").classList.add("open");
}
function renderHome(){renderModeHome();}

async function bootApp(){
  await loadUniversityData();
  if(typeof startAppWithSplash==="function") startAppWithSplash();
  else renderHome();
}
bootApp();

</script>
