<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
  <title>進学コンパス4.0｜基盤再構築版</title>
  <style>

:root{
  --navy:#143B73;
  --navy2:#0b2147;
  --bg:#eef4fb;
  --line:#dbe7f6;
  --soft:#f8fbff;
  --muted:#64748b;
}
*{box-sizing:border-box}
body{
  margin:0;
  background:var(--bg);
  color:var(--navy2);
  font-family:-apple-system,BlinkMacSystemFont,"Hiragino Sans","Yu Gothic",sans-serif;
  padding-bottom:86px;
}
button,input,select{font-family:inherit}
.topbar{
  position:sticky;
  top:0;
  z-index:50;
  height:76px;
  background:linear-gradient(135deg,#143B73,#0b2147);
  color:white;
  display:flex;
  align-items:center;
  justify-content:space-between;
  padding:0 22px;
  box-shadow:0 3px 16px rgba(11,33,71,.15);
}
.brand{display:flex;align-items:center;gap:12px;font-size:24px;font-weight:900}
.brand img{width:30px;height:30px;object-fit:contain}
.topMenu{border:0;background:transparent;color:white;font-size:24px;font-weight:900}
.app{width:100%;max-width:820px;margin:0 auto;padding:18px 16px}
.card{
  background:white;
  border:1px solid var(--line);
  border-radius:26px;
  padding:18px;
  box-shadow:0 8px 24px rgba(20,59,115,.04);
}
.hero{
  background:linear-gradient(135deg,#eef6ff,#fff 60%,#f5f9ff);
  border:1px solid var(--line);
  border-radius:26px;
  padding:22px 18px;
}
.hero h1{margin:0 0 8px;font-size:26px;line-height:1.35;letter-spacing:-.04em}
.hero p{margin:0 0 14px;color:var(--navy);font-weight:900;line-height:1.6}
.badge{display:inline-block;border:1px solid #9ee6be;background:#ecfdf3;color:#087443;border-radius:999px;padding:7px 12px;font-size:12px;font-weight:900;margin-bottom:14px}
.searchLine{display:flex;gap:8px;background:white;border-radius:22px;padding:9px}
.searchLine input{flex:1;min-width:0;border:0;background:transparent;font-size:15px;padding:9px}
.searchLine button,.btn{border:0;background:var(--navy);color:white;border-radius:18px;padding:11px 18px;font-weight:900}
.btn.light{background:#eef6ff;color:var(--navy)}
.modeBox{margin:14px 0;display:flex;justify-content:space-between;align-items:center;background:var(--soft);border:1px solid var(--line);border-radius:20px;padding:12px 14px;color:var(--navy);font-weight:900}
.grid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:12px}
.homeCard{border:1px solid var(--line);background:white;border-radius:22px;min-height:138px;padding:14px 8px;display:flex;flex-direction:column;justify-content:center;align-items:center;text-align:center;color:var(--navy);font-weight:900}
.icon{width:54px;height:54px;border-radius:18px;background:#eef6ff;display:flex;align-items:center;justify-content:center;font-size:29px;margin-bottom:9px}
.homeCard h3{margin:0;font-size:15px;line-height:1.35;word-break:keep-all}
.homeCard p{margin:6px 0 0;font-size:10.5px;color:var(--muted);line-height:1.45}
.miniGrid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:14px}
.miniBox{background:var(--soft);border:1px solid var(--line);border-radius:18px;padding:11px;color:var(--navy);font-size:12px;font-weight:900}
.message{text-align:center;margin:18px 0 0;color:var(--muted);font-size:18px;font-weight:900}
.bottomNav{
  position:fixed;left:0;right:0;bottom:0;z-index:60;
  height:76px;background:white;border-top:1px solid var(--line);
  display:flex;justify-content:space-around;align-items:center;
  padding-bottom:env(safe-area-inset-bottom);
}
.bottomNav button{border:0;background:transparent;color:var(--navy);font-size:20px;font-weight:900;line-height:1}
.bottomNav span{display:block;font-size:10px;margin-top:4px;white-space:nowrap}
.menuOverlay{display:none;position:fixed;inset:0;z-index:100;background:rgba(11,33,71,.35);padding:90px 18px}
.menuOverlay.on{display:block}
.menuPanel{background:white;border-radius:24px;padding:18px;max-width:520px;margin:0 auto}
.menuPanel h2{margin-top:0}
.menuPanel button{width:100%;border:1px solid var(--line);background:var(--soft);color:var(--navy);border-radius:16px;padding:12px;margin:5px 0;font-weight:900;text-align:left}
.formGrid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.formGrid label{font-size:12px;color:var(--navy);font-weight:900}
input,select{width:100%;border:1px solid var(--line);border-radius:14px;padding:10px;background:white;font-size:16px}
.uniCard{border:1px solid var(--line);background:white;border-radius:22px;padding:14px;margin:12px 0}
.uniCard h3{margin:0 0 6px;font-size:21px;color:var(--navy)}
.small{font-size:12px;color:var(--muted);line-height:1.6}
.actions{display:flex;flex-wrap:wrap;gap:8px;margin-top:10px}
.pill{display:inline-block;border:1px solid var(--line);background:#eef6ff;color:var(--navy);border-radius:999px;padding:6px 10px;font-size:12px;font-weight:900;margin:3px}
.compareBar{position:fixed;left:12px;right:12px;bottom:82px;z-index:55;background:white;border:1px solid var(--line);border-radius:18px;box-shadow:0 12px 30px rgba(20,59,115,.18);padding:10px;display:flex;align-items:center;justify-content:space-between;gap:8px}
.compareBar.hide{display:none}
.tableWrap{overflow-x:auto}
table.compare{border-collapse:separate;border-spacing:0;min-width:680px;width:100%;margin-top:12px}
.compare th,.compare td{border:1px solid var(--line);padding:10px;background:white;font-size:12px;vertical-align:top}
.compare th{background:var(--soft);color:var(--navy)}
.choiceCloud{display:flex;flex-wrap:wrap;gap:7px;margin:10px 0}
.choiceCloud button{border:1px solid var(--line);background:#eef6ff;color:var(--navy);border-radius:999px;padding:8px 10px;font-weight:900}
.choiceCloud button.on{background:var(--navy);color:white}
@media(min-width:760px){.grid{grid-template-columns:repeat(3,minmax(0,1fr))}}
@media(max-width:390px){.hero h1{font-size:23px}.homeCard{min-height:134px}.homeCard h3{font-size:14px}.homeCard p{font-size:10px}.app{padding:14px}}

</style>
</head>

  const state = {
    route: "home",
    query: "",
    filters: {area:"", pref:"", type:"", field:"", min:"", max:""},

    favorites: JSON.parse(localStorage.getItem("sc_favorites")||"[]"),
    ai: {interests:[], subjects:{}, grade:"", region:"", course:""}
  };
  const app = () => document.getElementById("app");
  const save = () => {

  };
  const esc = s => String(s ?? "").replace(/[&<>"']/g, m=>({"&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;","'":"&#39;"}[m]));
  const byName = name => universities.find(u=>u.name===name);
  const qText = u => [u.name,u.pref,u.area,u.type,u.field,...(u.faculties||[]),...(u.departments||[])].join(" ");

  function go(route, payload) {
    document.body.classList.remove("home");
    state.route = route;
    closeMenu();
    if(route==="home") return renderHome();
    if(route==="search") return renderSearch(payload);
    if(route==="dream") return renderDream();
    if(route==="ai") return renderAI();
    if(route==="compare") return renderCompare();
    if(route==="favorites") return renderFavorites();
    if(route==="detail") return renderDetail(payload);
    if(route==="official") return renderOfficial();
  }

  function homeSearch() {
    const q = document.getElementById("homeSearch")?.value?.trim() || "";
    state.query = q;
    go("search");
  }

  function renderHome() {
    document.body.classList.add("home");
    renderCompareBar(true);
    app().innerHTML = `<div class="card">
      <div class="hero">
        <h1>未来の自分を見つけよう。</h1>
        <p>大学選びから志望校合格まで、あなたの進路活動をサポートします。</p>
        <span class="badge">🛡️ 公式データベース対応</span>
        <div class="searchLine"><input id="homeSearch" placeholder="大学名・地域・学部・興味を検索" onkeydown="if(event.key==='Enter')SC.homeSearch()"><button onclick="SC.homeSearch()">検索</button></div>
      </div>
      <div class="modeBox"><span>🌱 高校生モード</span><button class="btn light">変更</button></div>
      <div class="grid">
        ${homeBtn("💭","夢・好きから探す","興味から大学を探す","dream")}
        ${homeBtn("📈","可能性診断","偏差値から候補を見る","ai")}
        ${homeBtn("📊","大学比較","大学を見比べる","compare")}
        ${homeBtn("🏫","大学検索","全国の大学を検索","search")}
        ${homeBtn("♥","お気に入り","保存した大学を見る","favorites")}
        ${homeBtn("🤖","AI進路診断","AIが進路を提案","ai")}
      </div>
      <div class="miniGrid"><div class="miniBox">♥ お気に入り：${state.favorites.length}校</div><div class="miniBox">📊 比較リスト：${state.compare.length}/3校</div></div>
      <div class="message">あなたの未来は、一つではありません。</div>
    </div>`;
  }
  function homeBtn(icon,title,desc,route) {
    return `<button class="homeCard" onclick="SC.go('${route}')"><span class="icon">${icon}</span><h3>${title}</h3><p>${desc}</p></button>`;
  }

  function filtered() {
    const f=state.filters;
    return universities.filter(u=>{
      if(state.query && !qText(u).includes(state.query)) return false;
      if(f.area && u.area!==f.area) return false;
      if(f.pref && u.pref!==f.pref) return false;
      if(f.type && u.type!==f.type) return false;
      if(f.field && !(u.field||"").includes(f.field)) return false;
      if(f.min && Number(u.level||0)<Number(f.min)) return false;
      if(f.max && Number(u.level||999)>Number(f.max)) return false;
      return true;
    }).slice(0,120);
  }
  function renderSearch() {
    renderCompareBar(false);
    const areas=[...new Set(universities.map(u=>u.area).filter(Boolean))].sort();
    const prefs=[...new Set(universities.map(u=>u.pref).filter(Boolean))].sort();
    const types=[...new Set(universities.map(u=>u.type).filter(Boolean))].sort();
    const fields=[...new Set(universities.map(u=>u.field).filter(Boolean))].slice(0,80);
    const list=filtered();
    app().innerHTML = `<div class="card">
      <h2>🔍 大学検索</h2>
      <div class="searchLine"><input value="${esc(state.query)}" placeholder="大学名・地域・学部・興味を入力" oninput="SC.setQuery(this.value)"><button onclick="SC.go('search')">検索</button></div>
      <details><summary class="modeBox">検索条件を開く</summary>
        <div class="formGrid">
          ${select("area","地域",areas)} ${select("pref","都道府県",prefs)}
          ${select("type","種別",types)} ${select("field","分野",fields)}
          <label>偏差値下限<input type="number" value="${state.filters.min}" onchange="SC.setFilter('min',this.value)"></label>
          <label>偏差値上限<input type="number" value="${state.filters.max}" onchange="SC.setFilter('max',this.value)"></label>
        </div>
        <div class="actions"><button class="btn" onclick="SC.go('search')">検索更新</button><button class="btn light" onclick="SC.clearFilters()">条件クリア</button></div>
      </details>
      <p class="small">${list.length}件表示</p>
      ${list.map(uniCard).join("") || `<div class="uniCard">該当する大学がありません。</div>`}
    </div>`;
  }
  function select(key,label,arr) {
    return `<label>${label}<select onchange="SC.setFilter('${key}',this.value)"><option value="">すべて</option>${arr.map(v=>`<option ${state.filters[key]===v?'selected':''}>${esc(v)}</option>`).join("")}</select></label>`;
  }
  function setQuery(v) { state.query=v; }
  function setFilter(k,v) { state.filters[k]=v; }
  function clearFilters() { state.query=""; state.filters={area:"",pref:"",type:"",field:"",min:"",max:""}; renderSearch(); }

  function uniCard(u) {
    const fav=state.favorites.includes(u.name);
    return `<div class="uniCard">
      <h3>${esc(u.name)}</h3>
      <p class="small">${esc(u.type)} ／ ${esc(u.pref)} ／ ${esc(u.field)} ／ 偏差値目安 ${u.level||"未登録"}</p>

      <h3>入試メモ</h3><p class="small">${esc(e.note||"詳細は公式情報で確認してください。")}</p>
      <div class="actions">
        ${q.officialUrl||e.officialUrl ? `<a class="btn light" href="${q.officialUrl||e.officialUrl}" target="_blank">公式</a>` : ""}
        ${q.admissionUrl||e.admissionUrl ? `<a class="btn light" href="${q.admissionUrl||e.admissionUrl}" target="_blank">入試</a>` : ""}
        <button class="btn" onclick="SC.toggleFavorite('${esc(u.name)}')">${state.favorites.includes(u.name)?"♥ 保存済み":"♡ 保存"}</button>
        <button class="btn light" onclick="SC.addCompare('${esc(u.name)}')">📊 比較に追加</button>
      </div>
    </div>`;
  }

  function toggleFavorite(name) {
    state.favorites = state.favorites.includes(name) ? state.favorites.filter(x=>x!==name) : [...state.favorites,name];
    save();
    if(state.route==="favorites") renderFavorites(); else renderDetail(name);
  }
  function renderFavorites() {
    renderCompareBar(false);
    const list=state.favorites.map(byName).filter(Boolean);
    app().innerHTML = `<div class="card"><h2>♥ お気に入り</h2>${list.length?list.map(uniCard).join(""):`<div class="uniCard">まだ保存されていません。</div>`}</div>`;
  }

  function addCompare(name) {
    if(state.compare.includes(name)) return alert("すでに比較リストに入っています。");
    if(state.compare.length>=3) return alert("比較は最大3校までです。");
    state.compare.push(name); save(); renderCompareBar(false); alert(name+"を比較に追加しました。");
  }
  function removeCompare(name) { state.compare=state.compare.filter(x=>x!==name); save(); renderCompare(); renderCompareBar(false); }
  function renderCompare() {
    renderCompareBar(true);
    const list=state.compare.map(byName).filter(Boolean);
    if(!list.length) return app().innerHTML=`<div class="card"><h2>📊 大学比較</h2><div class="uniCard">比較リストが空です。</div></div>`;
    const rows=[
      ["偏差値",u=>u.level||"未登録"],["地域",u=>`${u.area} / ${u.pref}`],["種別",u=>u.type],["分野",u=>u.field],
      ["学部",u=>(u.faculties||[]).join("、")||"未登録"],["公式確認",u=>u.quality?.confirmationStatus||"確認予定"],
      ["最終確認",u=>u.quality?.lastChecked||u.entrance?.lastChecked||"未確認"]
    ];
    app().innerHTML=`<div class="card"><h2>📊 大学比較</h2><div class="tableWrap"><table class="compare">
      <tr><th>項目</th>${list.map(u=>`<th>${esc(u.name)}<br><button class="btn light" onclick="SC.removeCompare('${esc(u.name)}')">削除</button></th>`).join("")}</tr>
      ${rows.map(r=>`<tr><td>${r[0]}</td>${list.map(u=>`<td>${esc(r[1](u))}</td>`).join("")}</tr>`).join("")}
    </table></div></div>`;
  }
  function renderCompareBar(hide=false) {
    let bar=document.getElementById("compareBar");
    if(!bar) { bar=document.createElement("div"); bar.id="compareBar"; bar.className="compareBar"; document.body.appendChild(bar); }
    if(hide || !state.compare.length) { bar.className="compareBar hide"; return; }
    bar.className="compareBar";
    bar.innerHTML=`<div><strong>📊 比較リスト：${state.compare.length}/3校</strong><br><span class="small">${state.compare.map(esc).join("、")}</span></div><button class="btn" onclick="SC.go('compare')">比較する</button>`;
  }

  function renderDream() {
    renderCompareBar(false);
    const words=["AI","教育","医療","看護","心理","法律","経済","ゲーム","デザイン","音楽","動物","スポーツ","国際","建築","食品","公務員"];
    app().innerHTML=`<div class="card"><h2>💭 夢・好きから探す</h2><p class="small">気になる言葉を選んでください。</p><div class="choiceCloud">${words.map(w=>`<button onclick="SC.dreamPick('${w}')">${w}</button>`).join("")}</div></div>`;
  }
  function dreamPick(w) { state.query=w; go("search"); }

  function renderAI() {
    renderCompareBar(false);
    const interests=["AI","プログラミング","教育","医療","看護","心理","経済","法律","国際","デザイン","音楽","スポーツ","食品","建築"];
    app().innerHTML=`<div class="card"><h2>🤖 AI進路診断</h2>
      <div class="formGrid">
        <label>学年<select onchange="SC.aiSet('grade',this.value)"><option>高校1年</option><option>高校2年</option><option>高校3年</option></select></label>
        <label>希望地域<select onchange="SC.aiSet('region',this.value)"><option>全国</option><option>東海</option><option>関東</option><option>関西</option></select></label>
        <label>英語偏差値<input type="number" onchange="SC.aiSubject('英語',this.value)"></label>
        <label>数学偏差値<input type="number" onchange="SC.aiSubject('数学',this.value)"></label>
        <label>国語偏差値<input type="number" onchange="SC.aiSubject('国語',this.value)"></label>
        <label>理科偏差値<input type="number" onchange="SC.aiSubject('理科',this.value)"></label>
        <label>社会偏差値<input type="number" onchange="SC.aiSubject('社会',this.value)"></label>
        <label>情報Ⅰ偏差値<input type="number" onchange="SC.aiSubject('情報',this.value)"></label>
      </div>
      <h3>興味</h3><div class="choiceCloud">${interests.map(i=>`<button onclick="SC.aiInterest('${i}')">${i}</button>`).join("")}</div>
      <button class="btn" onclick="SC.aiResult()">結果を見る</button>
      <div id="aiResult"></div>
    </div>`;
  }
  function aiSet(k,v){state.ai[k]=v}
  function aiSubject(k,v){state.ai.subjects[k]=Number(v)}
  function aiInterest(v){state.ai.interests=state.ai.interests.includes(v)?state.ai.interests.filter(x=>x!==v):[...state.ai.interests,v]}
  function aiResult(){
    const avg=Object.values(state.ai.subjects).filter(Boolean);
    const base=avg.length?avg.reduce((a,b)=>a+b,0)/avg.length:50;
    const list=universities.map(u=>({...u,score:aiScore(u,base)})).sort((a,b)=>b.score-a.score).slice(0,8);
    document.getElementById("aiResult").innerHTML=`<h3>おすすめ候補</h3><p class="small">興味・地域・偏差値目安から候補を出しています。</p>${list.map(uniCard).join("")}`;
  }
  function aiScore(u,base){
    let s=60-Math.abs((u.level||50)-base);
    if(state.ai.region && state.ai.region!=="全国" && u.area===state.ai.region)s+=12;
    for(const i of state.ai.interests) if((u.field||"").includes(i)) s+=15;
    return s;
  }

  function renderOfficial(){
    renderCompareBar(false);
    const confirmed=universities.filter(u=>u.quality?.confirmationStatus && u.quality.confirmationStatus!=="確認予定");
    app().innerHTML=`<div class="card"><h2>🛡️ 公式確認進捗</h2><div class="uniCard"><strong>${confirmed.length} / ${universities.length}大学</strong><p class="small">確認した大学だけを情報確認済みとして扱います。</p></div>${confirmed.slice(0,50).map(u=>`<span class="pill">${esc(u.name)}</span>`).join("")}</div>`;
  }

  function openMenu(){document.getElementById("menuOverlay").classList.add("on")}
  function closeMenu(e){ if(!e || e.target.id==="menuOverlay" || e.target.tagName==="BUTTON") document.getElementById("menuOverlay").classList.remove("on") }

  document.addEventListener("DOMContentLoaded",()=>go("home"));

  return {go,homeSearch,setQuery,setFilter,clearFilters,toggleFavorite,addCompare,removeCompare,dreamPick,aiSet,aiSubject,aiInterest,aiResult,openMenu,closeMenu};
})();

</script>
</body>
</html>
