<head>
<meta charset="UTF-8">

<title>大学進学ナビ｜複数エリア・並び替え対応版</title>
<style>
:root{--navy:#143b73;--blue:#2563eb;--sky:#eaf3ff;--gold:#f6b73c;--green:#e9fbef;--text:#172033;--muted:#637083;--line:#d9e4f2}
*{box-sizing:border-box}
body{margin:0;font-family:-apple-system,BlinkMacSystemFont,"Hiragino Sans","Yu Gothic","Noto Sans JP",sans-serif;background:linear-gradient(180deg,#eef6ff,#fff 45%,#f8fbff);color:var(--text)}
header{background:linear-gradient(135deg,#123a73,#2f6fd7);color:white;padding:26px 15px;text-align:center}
header h1{margin:6px 0;font-size:27px} header p{margin:0 auto;max-width:900px;font-size:14px;line-height:1.7}
main{max-width:1180px;margin:auto;padding:16px 14px 60px}
.home{position:fixed;right:13px;top:12px;z-index:10;border:0;border-radius:999px;background:white;color:var(--navy);font-weight:900;padding:10px 15px;box-shadow:0 8px 22px rgba(0,0,0,.18);cursor:pointer}
.card{background:white;border:1px solid var(--line);border-radius:22px;padding:20px;margin:16px 0;box-shadow:0 10px 30px rgba(20,59,115,.08)}
h2{color:var(--navy);font-size:23px;margin:5px 0 12px} h3{color:var(--navy);font-size:17px;margin:0 0 8px}
p,.help{line-height:1.75;color:var(--muted);font-size:14px}
.menu{display:grid;grid-template-columns:1fr;gap:15px}@media(min-width:780px){.menu{grid-template-columns:1fr 1fr 1fr}}
.menuCard{border:2px solid var(--line);border-radius:22px;padding:20px;background:#fff;cursor:pointer}
.menuCard:hover{border-color:var(--blue);background:#f8fbff} .icon{font-size:34px}
.grid{display:grid;gap:12px;grid-template-columns:1fr}@media(min-width:800px){.two{grid-template-columns:1fr 1fr}.three{grid-template-columns:1fr 1fr 1fr}}
label{display:block;font-size:13px;font-weight:900;color:#334155;margin:10px 0 5px}
input,select,textarea{width:100%;border:1px solid var(--line);border-radius:14px;padding:12px;font:inherit;background:white} textarea{min-height:88px}
.btn{border:0;border-radius:999px;padding:11px 14px;font-weight:900;text-decoration:none;display:inline-block;text-align:center;cursor:pointer}
.primary{background:var(--blue);color:white}.navy{background:var(--navy);color:white}.gold{background:#fff5d7;color:#795200;border:1px solid #ffd166}.gray{background:#eef2f7;color:#334155}.green{background:#ecfdf3;color:#087443;border:1px solid #abe7c3}
.actions{display:grid;grid-template-columns:1fr;gap:9px;margin-top:12px}@media(min-width:760px){.actions{grid-template-columns:repeat(4,1fr)}}
.box{border:1px solid var(--line);border-radius:18px;background:#fbfdff;padding:14px;margin:10px 0}
.option{border:2px solid var(--line);border-radius:16px;background:white;padding:14px;text-align:left;font-weight:900;cursor:pointer}.option.selected{border-color:var(--blue);background:#eaf3ff;color:var(--navy)}
.options{display:grid;gap:10px;grid-template-columns:1fr}@media(min-width:680px){.options{grid-template-columns:1fr 1fr}}
.checkGrid{display:grid;grid-template-columns:1fr;gap:10px}@media(min-width:720px){.checkGrid{grid-template-columns:1fr 1fr 1fr}}
.checkCard{border:2px solid var(--line);border-radius:16px;padding:13px;background:white;font-weight:900;cursor:pointer;display:flex;gap:8px;align-items:center}
.checkCard.on{border-color:var(--blue);background:#eaf3ff;color:var(--navy)}
.progress{height:10px;background:#e5e7eb;border-radius:999px;overflow:hidden}.bar{height:100%;background:linear-gradient(90deg,var(--gold),#ffdd7a);width:0}
.uni{border:1px solid var(--line);border-radius:18px;background:white;padding:15px;margin:10px 0}
.uniTop{display:flex;gap:10px;justify-content:space-between;align-items:flex-start}.uniName{font-size:18px;font-weight:900;color:#101828}
.tag{display:inline-block;border-radius:999px;padding:5px 9px;font-size:12px;font-weight:900;margin:2px;background:#eaf3ff;color:var(--navy)}
.challenge{background:#fff5d7;color:#795200;border:1px solid #ffd166}.match{background:#eaf3ff;color:#143b73;border:1px solid #bfd7ff}.safety{background:#ecfdf3;color:#087443;border:1px solid #abe7c3}

.starRow{display:flex;justify-content:space-between;border:1px solid #edf2f7;background:#fff;border-radius:13px;padding:8px 10px;font-size:13px;font-weight:800}
.facultyList{display:flex;flex-wrap:wrap;gap:6px;margin:8px 0}
.faculty{background:#f4f7fb;border:1px solid #e2e8f0;border-radius:999px;padding:5px 9px;font-size:12px;font-weight:800;color:#334155}
.faculty.hit{background:#fff5d7;border-color:#ffd166;color:#795200}
.resultControl{display:grid;grid-template-columns:1fr;gap:10px;margin:12px 0}
@media(min-width:760px){.resultControl{grid-template-columns:1fr 1fr 1fr}}
.hitBox{background:#fffaf0;border:1px solid #ffd166;border-radius:14px;padding:10px;margin:8px 0;color:#795200;font-size:13px;font-weight:900;line-height:1.6}
.employBox{background:#f0fdf4;border:1px solid #86efac;border-radius:14px;padding:10px;margin:8px 0;color:#166534;font-size:13px;font-weight:900;line-height:1.6}
ul{line-height:1.75} table{width:100%;border-collapse:collapse;font-size:13px} th,td{border:1px solid var(--line);padding:8px;text-align:left;vertical-align:top} th{background:#eef6ff;color:var(--navy)}
.compareWrap{width:100%;overflow-x:auto;overflow-y:hidden;-webkit-overflow-scrolling:touch;border:1px solid var(--line);border-radius:16px;background:white;position:relative}
.compareWrap::after{content:"横にスライドして比較できます →";display:block;position:sticky;left:0;bottom:0;background:linear-gradient(90deg,#fff7d6,#ffffff);color:#795200;font-size:12px;font-weight:900;padding:8px 10px;border-top:1px solid #ffe3a3}
.compareTable{min-width:820px;table-layout:fixed}
.compareTable th:first-child{width:120px;position:sticky;left:0;z-index:3;background:#eaf3ff;box-shadow:2px 0 0 var(--line)}
.compareTable th:not(:first-child),.compareTable td{min-width:180px;max-width:220px}.compareTable td{background:white}.compareTable .stars{font-size:17px}
.miniLink{display:inline-block;border-radius:999px;padding:6px 9px;margin:3px 0;font-size:12px;font-weight:900;text-decoration:none}
.miniPrimary{background:#2563eb;color:white}
.miniGold{background:#fff5d7;color:#795200;border:1px solid #ffd166}
.levelBadge{font-size:18px;font-weight:900;color:#143b73}
.strategyBadge{display:inline-block;border-radius:999px;padding:5px 9px;font-size:12px;font-weight:900;background:#eef6ff;color:#143b73;margin:2px}
.gapGood{color:#166534;font-weight:900}
.gapMid{color:#795200;font-weight:900}
.gapBad{color:#b42318;font-weight:900}
.compareSortBox{background:#f8fbff;border:1px solid var(--line);border-radius:16px;padding:12px;margin:10px 0}
.aiAdvice{background:linear-gradient(135deg,#f8fbff,#ffffff);border:2px solid #bfd7ff;border-radius:20px;padding:16px;margin:14px 0;box-shadow:0 8px 22px rgba(37,99,235,.08)}
.aiAdvice h3{display:flex;align-items:center;gap:8px}
.adviceBlock{background:white;border:1px solid var(--line);border-radius:16px;padding:13px;margin:10px 0}
.adviceBlock h4{margin:0 0 8px;color:#143b73;font-size:15px}
.adviceBlock ul{margin:6px 0 0;padding-left:20px}
.aiNote{font-size:12px;color:#64748b;line-height:1.7;background:#f8fafc;border-radius:12px;padding:9px;margin-top:10px}
.compareHint{display:flex;gap:8px;align-items:center;justify-content:space-between;background:#fff8df;color:#795200;border:1px solid #ffe3a3;border-radius:14px;padding:10px 12px;margin:8px 0 10px;font-size:13px;font-weight:900}
.small{font-size:12px;color:#64748b;line-height:1.6}
.printTitle{display:none}
@media print{header,.home,.noPrint,.actions,.btn,.progress{display:none!important}body{background:white}main{max-width:none;padding:0}.card{box-shadow:none;border:0;margin:0;padding:0}.box,.uni{break-inside:avoid;box-shadow:none;background:white}.printTitle{display:block;text-align:center;font-weight:900;font-size:18px;margin-bottom:10px}}
</style>
</head>

function matchScore(u){

 if(answers.kind==="国公立中心"&&(u.type==="国立"||u.type==="公立"))s+=3;
 if(answers.kind==="国公立中心"&&u.type==="私立")s-=1.5;

function employmentScore(u){
 let s=3;
 let f=u.field+" "+u.faculties.join(" ");

 // 資格職・安定職につながりやすい分野を強めに補正
 if(/医|看護|薬|保健|医療|歯/.test(f))s+=2.4;
 if(/教育|教員|児童/.test(f))s+=2.3;
 if(/工|理工|情報|建築|データ|科学/.test(f))s+=2.0;

 // 企業就職・公務員に広げやすい分野
 if(/経済|経営|商|法/.test(f))s+=1.0;
 if(/福祉|心理/.test(f))s+=0.9;
 if(/国際|外国語/.test(f))s+=0.6;

 // 専門性はあるが、就職安定度は学部・実績確認が必要
 if(/芸術|美術|音楽|デザイン/.test(f))s-=0.1;

 // 大学種別補正。ただし私立の資格職系が沈みすぎないよう控えめ
 if(u.type==="国立")s+=0.35;
 if(u.type==="公立")s+=0.3;

 // レベル補正も控えめ。偏差値だけで就職力を決めすぎない
 if(u.level>=60)s+=0.35; else if(u.level>=55)s+=0.2;

 // 教育・医療・工学情報は下限を高める
 if(/教育|教員|児童|医|看護|薬|保健|医療|歯|工|理工|情報/.test(f))s=Math.max(s,4.25);

 return Math.max(1,Math.min(5,s));
}

 let mode=answers.sort||"おすすめ順（就職の安定性重視）";
 if(mode==="偏差値が高い順")return list.sort((a,b)=>b.level-a.level||matchScore(b)-matchScore(a));
 if(mode==="自宅から近い順")return list.sort((a,b)=>prefNearScore(a)-prefNearScore(b)||matchScore(b)-matchScore(a));

 // おすすめ順：選択分野を最優先。そのうえで就職安定度を強く反映
 return list.sort((a,b)=>{
   const mismatchA = isMajorMismatch(a) ? -25 : 0;
   const mismatchB = isMajorMismatch(b) ? -25 : 0;
   const scoreA = fieldMatch(a)*4.0 + employmentScore(a)*3.0 + matchScore(a)*0.8 - prefNearScore(a)*0.08 + mismatchA;
   const scoreB = fieldMatch(b)*4.0 + employmentScore(b)*3.0 + matchScore(b)*0.8 - prefNearScore(b)*0.08 + mismatchB;
   return scoreB-scoreA || b.level-a.level;
 });
}

function examTypes(u){let arr=["一般選抜","共通テスト利用"]; if(u.type!=="国立")arr.push("学校推薦型選抜"); arr.push("総合型選抜"); return arr}
function hitFaculties(u){
 let tr=answers.track||"";
 if(tr==="まだ未定"||!tr)return u.faculties.slice(0,3);
 let words=[];
 if(tr==="文系")words=["文","法","経済","経営","商","社会","政策","心理","人文"];
 if(tr==="理系")words=["理","工","情報","建築","農","生命","科学"];

 if(tr==="芸術")words=["芸術","美術","音楽","デザイン","映像","メディア"];
 let hits=u.faculties.filter(f=>words.some(w=>f.includes(w)));
 return hits.length?hits:u.faculties.slice(0,3);
}
function hitReason(u){

 return parts.join(" ／ ");
}

function estimatedCommonTestRate(u){
 let base = Math.round(u.level + 10);
 let f = u.field+" "+u.faculties.join(" ");
 if(/国立|公立/.test(u.type))base += 4;
 if(/難関/.test(u.field))base += 6;
 if(/医|薬|看護|医療|歯/.test(f))base += 4;
 if(/芸術|美術|音楽|デザイン/.test(f))base -= 4;
 return Math.max(48, Math.min(88, base));
}
function estimated倍率(u){
 let f = u.field+" "+u.faculties.join(" ");
 let m = 2.1;
 if(u.type==="私立")m += 0.5;
 if(/医|薬|看護|医療|歯/.test(f))m += 0.4;
 if(/国際|外国語|心理/.test(f))m += 0.3;
 if(u.level>=60)m += 0.4;
 return Math.round(m*10)/10;
}
function currentRate(){
 let lv = levelNum();
 return Math.max(45, Math.min(82, Math.round(lv + 5)));
}
function gapText(u){
 let need=estimatedCommonTestRate(u), now=currentRate(), gap=need-now;
 if(gap<=0)return `<span class="gapGood">到達圏内</span><br><span class="small">目安 ${now}% / 必要 ${need}%</span>`;
 if(gap<=8)return `<span class="gapMid">あと${gap}%</span><br><span class="small">現在 ${now}% / 必要 ${need}%</span>`;
 return `<span class="gapBad">あと${gap}%</span><br><span class="small">現在 ${now}% / 必要 ${need}%</span>`;
}

 if(publicCount===list.length)caution.push("候補が国公立中心です。共通テストで必要な科目数が多くなるため、早めに科目確認が必要です。");
 if(list.length<3)caution.push("比較大学が少なめです。チャレンジ・実力相応・安全校を最低1校ずつ入れると受験戦略が立てやすくなります。");
 if(avgNeed-now>=10)caution.push("必要得点率との差が大きめです。まずは英語・数学・国語など配点の大きい科目を優先して伸ばしましょう。");
 if(!caution.length)caution.push("候補のバランスは比較的良好です。次は受験科目と入試日程を確認しましょう。");

 let todo=[];
 if(field==="教育")todo=["教員志望か、教育関連企業も含めるかを決める","英語・国語・小論文の基礎を固める","教育学部の面接・志望理由を早めに言語化する"];
 else if(field==="医療")todo=["必要な理科科目を早めに確定する","英語・数学・理科を優先して学習時間を増やす","医療職を目指す理由を面接で話せるようにする"];
 else if(field==="理系")todo=["数学の苦手単元を洗い出す","理科の選択科目を確定する","工学・情報・理学など学部の違いを比較する"];
 else if(field==="国際")todo=["英単語・長文読解を毎日固定する","英検など資格利用入試も確認する","留学制度や語学教育の違いを比較する"];
 else todo=["英語を最優先で安定させる","志望学部ごとの受験科目を確認する","安全校を1〜2校追加して受験日程を組む"];

 return `<div class="aiAdvice">
  <h3>🤖 AI進路アドバイス</h3>
  <div class="adviceBlock"><h4>総評</h4><p>${esc(summary)}</p></div>
  <div class="adviceBlock"><h4>おすすめ併願パターン</h4><ul>${balance.map(x=>`<li>${esc(x)}</li>`).join("")}</ul></div>
  <div class="adviceBlock"><h4>生徒が今やること</h4><ul>${todo.map(x=>`<li>${esc(x)}</li>`).join("")}</ul></div>
  <div class="adviceBlock"><h4>注意点</h4><ul>${caution.map(x=>`<li>${esc(x)}</li>`).join("")}</ul></div>
  <div class="adviceBlock"><h4>就職面で見るなら</h4><p>${esc(strong.name)}は、候補内では就職安定度が高めです。理由：${esc(employmentReason(strong))}</p></div>
  <div class="aiNote">このコメントは、選択した大学・分野・偏差値目安・共テ得点率目安・就職安定度から自動生成しています。最終判断は公式募集要項、受験科目、入試日程、学費を確認して決めてください。</div>
 </div>`;
}
function renderCompare(){$("app").innerHTML=`<div class="card"><h2>大学比較</h2><p>選んだ大学を、偏差値目安・昨年度共テ得点率目安・倍率目安・現在との差分まで比較します。</p><div class="box"><label>大学名から追加</label><input id="addName" placeholder="例：南山大学"><div class="actions"><button class="btn green" onclick="manualAdd()">追加</button><button class="btn primary" onclick="renderStrategy()">面談記録へ</button><button class="btn gray" onclick="selected=[];renderCompare()">選択リセット</button></div></div><div class="box">${compareSortControl()}${compareRows()}</div>${aiAdviceHtml()}</div>`}
function manualAdd(){let n=$("addName").value.trim(); let u=universities.find(x=>x.name===n)||universities.find(x=>x.name.includes(n)); if(!u)return alert("大学が見つかりません。正式名称に近い形で入力してください。"); addSelected(u.name); renderCompare()}
function selectedCards(){let list=selected.map(getU).filter(Boolean); if(!list.length)return "<p class='help'>大学比較に追加した大学がここに表示されます。</p>"; return list.map(u=>`<div class="box"><h3>${esc(u.name)}</h3><p class="small">${esc(u.area)}／${esc(u.pref)}／${esc(u.field)}</p><div class="hitBox">偏差値目安：${u.level}前後<br>昨年度共テ得点率目安：${estimatedCommonTestRate(u)}%前後<br>昨年度倍率目安：${estimated倍率(u)}倍前後<br>現在との差分：${gapText(u)}</div><h3>主な学部</h3>${facultyChips(u)}<div class="starGrid"><div class="starRow"><span>相性</span><span class="stars">${stars(ratings(u).fit)}</span></div><div class="starRow"><span>現実度</span><span class="stars">${stars(ratings(u).chance)}</span></div></div><div class="employBox">就職安定度：${stars(employmentScore(u))}　${employmentLabel(u)}<br>${employmentReason(u)}</div><p><strong>主な就職分野</strong></p><ul>${careerImage(u).map(x=>"<li>"+esc(x)+"</li>").join("")}</ul><div class="actions"><a class="btn primary" target="_blank" href="${manabiUrl(u.name)}">受験科目</a><a class="btn gold" target="_blank" href="${careerUrl(u.name)}">就職実績</a></div></div>`).join("")}
function renderStrategy(){$("app").innerHTML=`<div class="card"><div class="printTitle">面談記録・進路戦略シート</div><h2>面談記録・進路戦略</h2><div class="grid three"><div><label>生徒名</label><input id="name" value="${esc(student.name)}"></div><div><label>高校名</label><input id="school" value="${esc(student.school)}"></div><div><label>学年</label><input id="grade" value="${esc(student.grade||answers.grade||"")}"></div><div><label>担当講師</label><input id="teacher" value="${esc(student.teacher)}"></div><div><label>面談日</label><input id="date" value="${esc(student.date||today())}"></div><div><label>志望メモ</label><input id="goal" value="${esc(student.goal)}"></div></div><div class="box"><h3>候補大学 比較表</h3>${compareRows()}</div>${aiAdviceHtml()}<div class="grid two">${selectedCards()}</div><div class="grid two"><div class="box"><h3>面談メモ</h3><textarea id="memo">${esc(student.memo)}</textarea></div><div class="box"><h3>次回までの課題</h3><textarea id="action">${esc(student.action)}</textarea></div></div><div class="actions noPrint"><button class="btn primary" onclick="saveRecord()">保存</button><button class="btn navy" onclick="window.print()">印刷・PDF保存</button><button class="btn gray" onclick="renderCompare()">大学比較へ</button><button class="btn gray" onclick="renderHome()">ホーム</button></div></div>`;scrollTo(0,0)}
function saveRecord(){collect();let arr=JSON.parse(localStorage.getItem("univ_nav_records_v2")||"[]");arr.unshift({id:Date.now(),student,answers,selected,date:new Date().toISOString()});localStorage.setItem("univ_nav_records_v2",JSON.stringify(arr.slice(0,80)));alert("保存しました")}
renderHome();
</script>
</body>
</html>
