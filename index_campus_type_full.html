<style>
:root{--navy:#143b73;--blue:#2563eb;--sky:#eaf3ff;--gold:#f6b73c;--green:#e9fbef;--text:#172033;--muted:#637083;--line:#d9e4f2}
*{box-sizing:border-box}
body{margin:0;font-family:-apple-system,BlinkMacSystemFont,"Hiragino Sans","Yu Gothic","Noto Sans JP",sans-serif;background:linear-gradient(180deg,#eef6ff,#fff 45%,#f8fbff);color:var(--text)}
header{background:linear-gradient(135deg,#123a73,#2f6fd7);color:white;padding:26px 15px;text-align:center}
header h1{margin:6px 0;font-size:27px} header p{margin:0 auto;max-width:900px;font-size:14px;line-height:1.7}
main{max-width:1180px;margin:auto;padding:16px 14px 60px}
.home{position:fixed;right:13px;top:12px;z-index:10;border:0;border-radius:999px;background:white;color:var(--navy);font-weight:900;padding:10px 15px;box-shadow:0 8px 22px rgba(0,0,0,.18);cursor:pointer}
.card{background:white;border:1px solid var(--line);border-radius:22px;padding:20px;margin:16px 0;box-shadow:0 10px 30px rgba(20,59,115,.08)}

p,.help{line-height:1.75;color:var(--muted);font-size:14px}
.menu{display:grid;grid-template-columns:1fr;gap:15px}@media(min-width:780px){.menu{grid-template-columns:1fr 1fr 1fr}}

.grid{display:grid;gap:12px;grid-template-columns:1fr}@media(min-width:800px){.two{grid-template-columns:1fr 1fr}.three{grid-template-columns:1fr 1fr 1fr}}
label{display:block;font-size:13px;font-weight:900;color:#334155;margin:10px 0 5px}
input,select,textarea{width:100%;border:1px solid var(--line);border-radius:14px;padding:12px;font:inherit;background:white} textarea{min-height:88px}
.btn{border:0;border-radius:999px;padding:11px 14px;font-weight:900;text-decoration:none;display:inline-block;text-align:center;cursor:pointer}
.primary{background:var(--blue);color:white}.navy{background:var(--navy);color:white}.gold{background:#fff5d7;color:#795200;border:1px solid #ffd166}.gray{background:#eef2f7;color:#334155}.green{background:#ecfdf3;color:#087443;border:1px solid #abe7c3}
.actions{display:grid;grid-template-columns:1fr;gap:9px;margin-top:12px}@media(min-width:760px){.actions{grid-template-columns:repeat(4,1fr)}}
.box{border:1px solid var(--line);border-radius:18px;background:#fbfdff;padding:14px;margin:10px 0}
.option{border:2px solid var(--line);border-radius:16px;background:white;padding:14px;text-align:left;font-weight:900;cursor:pointer}.option.selected{border-color:var(--blue);background:#eaf3ff;color:var(--navy)}
.options{display:grid;gap:10px;grid-template-columns:1fr}@media(min-width:680px){.options{grid-template-columns:1fr 1fr}}
.checkGrid{display:grid;grid-template-columns:1fr;gap:10px}@media(min-width:720px){.checkGrid{grid-template-columns:1fr 1fr 1fr}}
.checkCard{border:2px solid var(--line);border-radius:16px;padding:13px;background:white;font-weight:900;cursor:pointer;display:flex;gap:8px;align-items:center}

.progress{height:10px;background:#e5e7eb;border-radius:999px;overflow:hidden}.bar{height:100%;background:linear-gradient(90deg,var(--gold),#ffdd7a);width:0}
.uni{border:1px solid var(--line);border-radius:18px;background:white;padding:15px;margin:10px 0}
.uniTop{display:flex;gap:10px;justify-content:space-between;align-items:flex-start}.uniName{font-size:18px;font-weight:900;color:#101828}

.challenge{background:#fff5d7;color:#795200;border:1px solid #ffd166}.match{background:#eaf3ff;color:#143b73;border:1px solid #bfd7ff}.safety{background:#ecfdf3;color:#087443;border:1px solid #abe7c3}

.starRow{display:flex;justify-content:space-between;border:1px solid #edf2f7;background:#fff;border-radius:13px;padding:8px 10px;font-size:13px;font-weight:800}
.facultyList{display:flex;flex-wrap:wrap;gap:6px;margin:8px 0}
.faculty{background:#f4f7fb;border:1px solid #e2e8f0;border-radius:999px;padding:5px 9px;font-size:12px;font-weight:800;color:#334155}
.faculty.hit{background:#fff5d7;border-color:#ffd166;color:#795200}
.resultControl{display:grid;grid-template-columns:1fr;gap:10px;margin:12px 0}

.employBox{background:#f0fdf4;border:1px solid #86efac;border-radius:14px;padding:10px;margin:8px 0;color:#166534;font-size:13px;font-weight:900;line-height:1.6}
ul{line-height:1.75} table{width:100%;border-collapse:collapse;font-size:13px} th,td{border:1px solid var(--line);padding:8px;text-align:left;vertical-align:top} th{background:#eef6ff;color:var(--navy)}
.compareWrap{width:100%;overflow-x:auto;overflow-y:hidden;-webkit-overflow-scrolling:touch;border:1px solid var(--line);border-radius:16px;background:white;position:relative}

.miniLink{display:inline-block;border-radius:999px;padding:6px 9px;margin:3px 0;font-size:12px;font-weight:900;text-decoration:none}
.miniPrimary{background:#2563eb;color:white}
.miniGold{background:#fff5d7;color:#795200;border:1px solid #ffd166}
.levelBadge{font-size:18px;font-weight:900;color:#143b73}
.strategyBadge{display:inline-block;border-radius:999px;padding:5px 9px;font-size:12px;font-weight:900;background:#eef6ff;color:#143b73;margin:2px}
.gapGood{color:#166534;font-weight:900}
.gapMid{color:#795200;font-weight:900}
.gapBad{color:#b42318;font-weight:900}
.compareSortBox{background:#f8fbff;border:1px solid var(--line);border-radius:16px;padding:12px;margin:10px 0}
.aiAdvice{background:linear-gradient(135deg,#f8fbff,#ffffff);border:2px solid #bfd7ff;border-radius:20px;padding:16px;margin:14px 0;box-shadow:0 8px 22px rgba(37,99,235,.08)}
.aiAdvice h3{display:flex;align-items:center;gap:8px}
.adviceBlock{background:white;border:1px solid var(--line);border-radius:16px;padding:13px;margin:10px 0}
.adviceBlock h4{margin:0 0 8px;color:#143b73;font-size:15px}
.adviceBlock ul{margin:6px 0 0;padding-left:20px}
.aiNote{font-size:12px;color:#64748b;line-height:1.7;background:#f8fafc;border-radius:12px;padding:9px;margin-top:10px}
.sheetBox{background:#f0fdf4;border:1px solid #86efac;border-radius:18px;padding:14px;margin:12px 0}
.sheetStatus{font-size:13px;font-weight:900;margin-top:8px;line-height:1.6}
.sheetOk{color:#166534}.sheetNg{color:#b42318}

.addPanel{background:#f8fbff;border:1px solid var(--line);border-radius:18px;padding:14px;margin:10px 0}
.addToggle{width:100%;border:0;border-radius:14px;background:#eaf3ff;color:#143b73;font-weight:900;padding:12px;text-align:left;cursor:pointer}
.addBody{display:none;margin-top:12px}
.addBody.open{display:block}
.selectedChips{display:flex;flex-wrap:wrap;gap:7px;margin-top:10px}
.selectedChip{display:inline-flex;align-items:center;gap:6px;background:#eaf3ff;color:#143b73;border:1px solid #bfd7ff;border-radius:999px;padding:7px 10px;font-size:13px;font-weight:900}
.selectedChip button{border:0;background:#fff;color:#143b73;border-radius:999px;width:20px;height:20px;font-weight:900;cursor:pointer}


.chanceArea{margin:10px 0;padding:12px;background:#f8fbff;border:1px solid #bfd7ff;border-radius:14px}
.chanceHead{display:flex;justify-content:space-between;align-items:center;gap:10px;margin-bottom:8px}
.chanceTitle{font-size:13px;font-weight:900;color:#143b73}
.chancePercent{font-size:26px;font-weight:900;color:#2563eb}
.chanceJudge{font-weight:900;margin:4px 0 8px;color:#334155}
.chanceBar{height:12px;background:#e5e7eb;border-radius:999px;overflow:hidden}
.chanceFill{height:100%;background:linear-gradient(90deg,#f59e0b,#2563eb,#22c55e);border-radius:999px}
.chanceNote{font-size:11px;color:#64748b;line-height:1.6;margin-top:7px}

.deepScoreGrid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
@media(min-width:760px){.deepScoreGrid{grid-template-columns:repeat(3,1fr)}}
.scoreCard{background:white;border:1px solid var(--line);border-radius:16px;padding:12px}
.scoreCard input{font-size:18px;font-weight:900;text-align:center}
.deepResult{background:linear-gradient(135deg,#eef6ff,#ffffff);border:2px solid #bfd7ff;border-radius:20px;padding:16px;margin:14px 0}
.priorityItem{display:flex;justify-content:space-between;gap:10px;align-items:center;background:white;border:1px solid var(--line);border-radius:14px;padding:10px;margin:8px 0}
.priorityItem strong{color:#143b73}
.subjectBadge{display:inline-block;border-radius:999px;background:#eaf3ff;color:#143b73;border:1px solid #bfd7ff;padding:5px 9px;margin:3px;font-size:12px;font-weight:900}
.subjectWeak{background:#fff5d7;color:#795200;border-color:#ffd166}
.subjectStrong{background:#ecfdf3;color:#087443;border-color:#abe7c3}
/* 棒グラフ修正版：px指定でスマホでも高さ差が出る */
.deepChart{display:flex;align-items:flex-end;gap:8px;height:190px;padding:12px;background:#fff;border:1px solid var(--line);border-radius:16px}
.deepBar{flex:1;height:140px;display:flex;flex-direction:column;align-items:center;justify-content:flex-end;gap:5px}
.deepBarFill{width:100%;max-width:42px;background:linear-gradient(180deg,#2563eb,#bfd7ff);border-radius:8px 8px 0 0;min-height:8px;display:block}
.deepBar span{font-size:11px;font-weight:900;color:#334155}
.rankList{display:grid;gap:8px;margin-top:10px}
.rankItem{display:grid;grid-template-columns:42px 1fr 52px;align-items:center;gap:8px;background:white;border:1px solid var(--line);border-radius:14px;padding:9px}
.rankNo{font-weight:900;color:#143b73}.rankName{font-weight:900}.rankScore{text-align:right;font-weight:900;color:#2563eb}
.analysisPair{display:grid;grid-template-columns:1fr;gap:10px;margin-top:10px}@media(min-width:760px){.analysisPair{grid-template-columns:1fr 1fr}}
.compareHint{display:flex;gap:8px;align-items:center;justify-content:space-between;background:#fff8df;color:#795200;border:1px solid #ffe3a3;border-radius:14px;padding:10px 12px;margin:8px 0 10px;font-size:13px;font-weight:900}
.small{font-size:12px;color:#64748b;line-height:1.6}
.printTitle{display:none}
@media print{header,.home,.noPrint,.actions,.btn,.progress{display:none!important}body{background:white}main{max-width:none;padding:0}.card{box-shadow:none;border:0;margin:0;padding:0}.box,.uni{break-inside:avoid;box-shadow:none;background:white}.printTitle{display:block;text-align:center;font-weight:900;font-size:18px;margin-bottom:10px}}

/* === 起動アニメーション：進学コンパス === */
.splash{
  position:fixed;
  inset:0;
  z-index:99999;
  display:flex;
  align-items:center;
  justify-content:center;
  background:linear-gradient(135deg,#0b2f6f,#2563eb);
  color:#fff;
  transition:opacity .75s ease, visibility .75s ease;
}
.splash.fade{
  opacity:0;
  visibility:hidden;
  pointer-events:none;
}
.splash-content{
  text-align:center;
  padding:24px;
  animation:splashPop .75s ease both;
}
.splash-compass{
  font-size:88px;
  line-height:1;
  animation:spinCompass 2.3s cubic-bezier(.25,.9,.25,1) both;
  filter:drop-shadow(0 14px 24px rgba(0,0,0,.28));
}
.splash-title{
  font-size:34px;
  font-weight:900;
  margin:16px 0 6px;
  letter-spacing:.04em;
  text-shadow:0 3px 12px rgba(0,0,0,.22);
}
.splash-copy{
  color:rgba(255,255,255,.9);
  font-size:14px;
  font-weight:800;
  margin:0;
}
.splash-loading{
  width:170px;
  height:6px;
  background:rgba(255,255,255,.28);
  border-radius:999px;
  margin:24px auto 0;
  overflow:hidden;
}
.splash-loading span{
  display:block;
  height:100%;
  width:0;
  background:linear-gradient(90deg,#f6b73c,#ffffff);
  border-radius:999px;
  animation:loadBar 3s ease forwards;
}
@keyframes spinCompass{
  0%{transform:rotate(-220deg) scale(.72);opacity:0}
  55%{transform:rotate(20deg) scale(1.08);opacity:1}
  100%{transform:rotate(0deg) scale(1)}
}
@keyframes splashPop{
  0%{transform:translateY(14px);opacity:0}
  100%{transform:translateY(0);opacity:1}
}
@keyframes loadBar{
  0%{width:0}
  100%{width:100%}
}

.lifeDetailRow span:first-child{color:#334155}

function matchScore(u){let s=fieldMatch(u)*2.2;let areas=answers.areas||[];if(areas.includes(u.area))s+=4;s+=Math.max(0,4-areaRank(u.area));if(answers.kind==="国公立中心"&&(u.type==="国立"||u.type==="公立"))s+=3;if(answers.kind==="国公立中心"&&u.type==="私立")s-=1.5;if(answers.kind==="私立中心"&&u.type==="私立")s+=3;if(answers.kind==="私立中心"&&(u.type==="国立"||u.type==="公立"))s-=1;if(u.pref===(answers.residence||"愛知県"))s+=2;s-=Math.abs(u.level-levelNum())/5;if(isMajorMismatch(u))s-=10;return s}
function employmentScore(u){let s=3;let f=u.field+" "+u.faculties.join(" ");if(/医|看護|薬|保健|医療|歯/.test(f))s+=2.4;if(/教育|教員|児童/.test(f))s+=2.3;if(/工|理工|情報|建築|データ|科学/.test(f))s+=2.0;if(/経済|経営|商|法/.test(f))s+=1.0;if(/福祉|心理/.test(f))s+=0.9;if(/国際|外国語/.test(f))s+=0.6;if(/芸術|美術|音楽|デザイン/.test(f))s-=0.1;if(u.type==="国立")s+=0.35;if(u.type==="公立")s+=0.3;if(u.level>=60)s+=0.35;else if(u.level>=55)s+=0.2;if(/教育|教員|児童|医|看護|薬|保健|医療|歯|工|理工|情報/.test(f))s=Math.max(s,4.25);return Math.max(1,Math.min(5,s))}
function employmentLabel(u){let e=employmentScore(u);if(e>=4.7)return "かなり強い";if(e>=4.0)return "強い";if(e>=3.3)return "安定しやすい";return "分野次第"}
function employmentReason(u){let f=u.field+" "+u.faculties.join(" ");if(/医|看護|薬|保健|医療|歯/.test(f))return "医療・資格職につながりやすい";if(/教育|教員|児童/.test(f))return "教員・公務員系を目指しやすい";if(/工|理工|情報|建築|データ|科学/.test(f))return "技術職・IT・メーカーに強い";if(/経済|経営|商|法/.test(f))return "企業就職・公務員に広げやすい";if(/国際|外国語/.test(f))return "語学を活かす職種に広げやすい";return "学部選びと対策次第で広げられる"}
function sortList(list){let mode=answers.sort||"おすすめ順（就職の安定性重視）";if(mode==="偏差値が高い順")return list.sort((a,b)=>b.level-a.level||matchScore(b)-matchScore(a));if(mode==="自宅から近い順")return list.sort((a,b)=>prefNearScore(a)-prefNearScore(b)||matchScore(b)-matchScore(a));return list.sort((a,b)=>{const mismatchA=isMajorMismatch(a)?-25:0;const mismatchB=isMajorMismatch(b)?-25:0;const scoreA=fieldMatch(a)*4.0+employmentScore(a)*3.0+matchScore(a)*0.8-prefNearScore(a)*0.08+mismatchA;const scoreB=fieldMatch(b)*4.0+employmentScore(b)*3.0+matchScore(b)*0.8-prefNearScore(b)*0.08+mismatchB;return scoreB-scoreA||b.level-a.level})}

function careerImage(u){let f=u.field;if(/医療/.test(f))return["病院・医療機関","薬局・医療関連企業","保健・福祉分野","医療専門職"];if(/教育/.test(f))return["小学校・中学校・高校教員","公務員","教育関連企業","児童・福祉分野"];if(/理|工|情報/.test(f))return["メーカー・IT企業","研究開発・技術職","インフラ・通信","建築・設計分野"];if(/国際|外国語/.test(f))return["航空・旅行・ホテル","商社・メーカー海外部門","英語を使う事務職","国際交流・サービス"];if(/芸術/.test(f))return["デザイン・制作会社","広告・映像・ゲーム関連","作家・クリエイター","音楽・舞台関連"];if(/福祉|心理/.test(f))return["福祉施設・医療福祉分野","公務員","心理・教育関連","生活支援分野"];if(/経済|商|文|法/.test(f))return["金融・保険","メーカー・商社","公務員","広告・サービス業"];return["一般企業","公務員","専門職","地域企業"]}

function hitFaculties(u){let tr=answers.track||"";if(tr==="まだ未定"||!tr)return u.faculties.slice(0,3);let words=[];if(tr==="文系")words=["文","法","経済","経営","商","社会","政策","心理","人文"];if(tr==="理系")words=["理","工","情報","建築","農","生命","科学"];if(tr==="医療")words=["医","看護","薬","保健","医療","歯"];if(tr==="教育")words=["教育","児童","教員"];if(tr==="国際")words=["国際","外国語","英語","グローバル","教養"];if(tr==="芸術")words=["芸術","美術","音楽","デザイン","映像","メディア"];let hits=u.faculties.filter(f=>words.some(w=>f.includes(w)));return hits.length?hits:u.faculties.slice(0,3)}
function hitReason(u){let hits=hitFaculties(u);let areaOk=(answers.areas||[]).includes(u.area)||answers.commute==="全国OK";let parts=[];if(!isMajorMismatch(u))parts.push("選択分野に一致");else parts.push("選択分野とはやや別系統");if(hits.length)parts.push("学部："+hits.slice(0,4).map(esc).join("・"));if(areaOk)parts.push("エリア："+esc(u.area));if(u.pref===(answers.residence||"愛知県"))parts.push("居住地と同一県");return parts.join(" ／ ")}

const subjectLabels={english:"英語",japanese:"国語",math:"数学",science:"理科",social:"社会",info:"情報"};
function subjectVal(k){const v=Number((answers.deepScores||{})[k]);return isNaN(v)||v<=0?null:v}
function deepAverage(){const vals=Object.keys(subjectLabels).map(subjectVal).filter(v=>v!==null);if(!vals.length)return levelNum();return Math.round(vals.reduce((a,b)=>a+b,0)/vals.length)}
function updateLevelFromDeep(){const avg=deepAverage();if(avg>=63)answers.level="65以上";else if(avg>=58)answers.level="60前後";else if(avg>=53)answers.level="55前後";else if(avg>=48)answers.level="50前後";else answers.level="45前後"}
function sortedSubjects(){return Object.keys(subjectLabels).map(k=>({key:k,label:subjectLabels[k],value:subjectVal(k)})).filter(x=>x.value!==null).sort((a,b)=>b.value-a.value)}
function strongSubjects(){return sortedSubjects().filter(x=>x.value>=55).slice(0,3)}
function weakSubjects(){return [...sortedSubjects()].reverse().filter(x=>x.value<55).slice(0,3)}
function subjectPriority(){const vals=Object.keys(subjectLabels).map(k=>({key:k,label:subjectLabels[k],value:subjectVal(k)})).filter(x=>x.value!==null);const field=answers.deepField||answers.track||"";let weight={english:1,japanese:1,math:1,science:1,social:1,info:1};if(/理系|情報|理工|工学|医療|看護/.test(field)){weight.math+=1.2;weight.science+=1.1;weight.english+=0.6}if(/文系|法|経済|経営|国際|外国語|教育/.test(field)){weight.english+=1.0;weight.japanese+=0.8;weight.social+=0.5}if(/情報/.test(field)){weight.math+=1.0;weight.info+=1.2;weight.english+=0.5}return vals.map(x=>({...x,priority:(65-x.value)*weight[x.key]})).sort((a,b)=>b.priority-a.priority).slice(0,3)}
function scoreFitForUniversity(u){const avg=deepAverage();const gap=u.level-avg;let score=matchScore(u)+employmentScore(u)*2-gap*0.6;const f=(u.field+" "+u.faculties.join(" "));const field=answers.deepField||answers.track||"";if(field&&field!=="まだ未定"){if(field==="教育"&&/教育|児童|教員/.test(f))score+=8;if((field==="医療"||field==="看護")&&/医|看護|薬|保健|医療|歯/.test(f))score+=8;if(field==="情報"&&/情報|データ|工|理工/.test(f))score+=8;if(field==="理系"&&/理|工|情報|農|生命|建築/.test(f))score+=7;if(field==="文系"&&/文|法|経済|経営|商|社会|政策/.test(f))score+=7;if((field==="国際"||field==="外国語")&&/国際|外国語|英語|グローバル/.test(f))score+=7;if(field==="芸術"&&/芸術|美術|音楽|デザイン|映像/.test(f))score+=8}return score}
function deepCandidates(min,max){const avg=deepAverage();const base=allFiltered().filter(u=>u.level-avg>=min&&u.level-avg<=max);return base.sort((a,b)=>scoreFitForUniversity(b)-scoreFitForUniversity(a)).slice(0,6)}

function allFiltered(){return universities.filter(allowedByArea)}
function bucket(min,max){let lv=levelNum();let base=allFiltered().filter(u=>u.level-lv>=min&&u.level-lv<=max);let matched=base.filter(u=>!isMajorMismatch(u));if(matched.length>=4)return sortList(matched).slice(0,10);return sortList(base).slice(0,10)}

function admissionChance(u){
 let avg = (typeof deepAverage==="function" ? deepAverage() : levelNum());
 let diff = avg - u.level;
 let chance = 60 + diff*4;
 chance += Math.min(8, Math.max(-6, fieldMatch(u)*1.2));
 chance += (employmentScore(u)-3)*2;
 if(u.type==="国立"||u.type==="公立")chance -= 4;
 if(/難関/.test(u.field))chance -= 5;
 if(isMajorMismatch(u))chance -= 12;
 return Math.max(18, Math.min(92, Math.round(chance)));
}
function chanceJudge(rate){
 if(rate>=85)return "🟢 安全圏";
 if(rate>=70)return "🔵 合格圏";
 if(rate>=50)return "🟡 実力相応";
 if(rate>=35)return "🟠 チャレンジ";
 return "🔴 難関挑戦";
}
function chanceHtml(u){
 const rate=admissionChance(u);
 return `<div class="chanceArea">
  <div class="chanceHead">
    <div class="chanceTitle">合格可能性目安</div>
    <div class="chancePercent">${rate}%</div>
  </div>

function campusLifeProfile(u){
 let o=campusLifeOverrides[u.name];
 if(o){
   return {...o};
 }
 let f=(u.field+" "+u.faculties.join(" "));
 let study=3,circle=3,job=3,global=2,access=3;
 if(u.type==="国立"||u.type==="公立"){study+=1}
 if(u.type==="私立"){circle+=1;access+=1}
 if(/理|工|情報|医|薬|看護|農|生命|科学/.test(f)){study+=1}
 if(/医|看護|薬|保健|医療|歯|教育|教員|工|理工|情報/.test(f)){job+=2}
 if(/経済|経営|商|法/.test(f)){job+=1}
 if(/国際|外国語|英語|グローバル|教養/.test(f)){global+=3}
 if(/芸術|美術|音楽|デザイン|映像/.test(f)){study+=1;circle+=1}
 if(u.pref===(answers.residence||"愛知県")){access+=1}
 if(u.level>=60){study+=1;job+=1}
 if(u.level<=48){study-=1;circle+=1}
 study=Math.max(1,Math.min(5,study));
 circle=Math.max(1,Math.min(5,circle));
 job=Math.max(1,Math.min(5,job));
 global=Math.max(1,Math.min(5,global));
 access=Math.max(1,Math.min(5,access));
 return {study,circle,job,global,access,note:"大学種別・学部構成・地域から作成した面談用の目安です。"};
}

}

function renderDetail(name){let u=getU(name),r=ratings(u),careers=careerImage(u);$("app").innerHTML=`<div class="card"><h2>${esc(u.name)}</h2><div><span class="tag">${esc(u.type)}</span><span class="tag">${esc(u.area)}</span><span class="tag">${esc(u.pref)}</span><span class="tag">${esc(u.field)}</span></div><div class="box"><h3>主な学部</h3><div class="hitBox">検索にヒット：${hitReason(u)}</div>${facultyChips(u,12)}</div><div class="starGrid"><div class="starRow"><span>大学との相性</span><span class="stars">${stars(r.fit)}</span></div><div class="starRow"><span>入試の現実度</span><span class="stars">${stars(r.chance)}</span></div><div class="starRow"><span>将来の広がり</span><span class="stars">${stars(r.future)}</span></div><div class="starRow"><span>就職安定度</span><span class="stars">${stars(employmentScore(u))}</span></div></div><div class="box"><h3>大学生活タイプ</h3>${campusLifeTypeHtml(u)}${campusLifeDetailHtml(u)}</div><div class="grid two"><div class="box"><h3>主な入試方式</h3><ul>${examTypes(u).map(x=>"<li>"+x+"</li>").join("")}</ul></div><div class="box"><h3>卒業後の進路イメージ</h3><ul>${careers.map(x=>"<li>"+esc(x)+"</li>").join("")}</ul><p class="small">具体的な企業名は年度で変わるため、公式の就職実績で確認します。</p></div></div><div class="actions"><button class="btn green" onclick="addSelected('${esc(u.name)}')">比較・面談に追加</button><a class="btn primary" target="_blank" href="${manabiUrl(u.name)}">受験科目を見る</a><a class="btn gold" target="_blank" href="${careerUrl(u.name)}">就職実績を見る</a><a class="btn gray" target="_blank" href="${officialExamUrl(u.name)}">公式募集要項を探す</a></div></div>`;scrollTo(0,0)}
function estimatedCommonTestRate(u){let base=Math.round(u.level+10);let f=u.field+" "+u.faculties.join(" ");if(/国立|公立/.test(u.type))base+=4;if(/難関/.test(u.field))base+=6;if(/医|薬|看護|医療|歯/.test(f))base+=4;if(/芸術|美術|音楽|デザイン/.test(f))base-=4;return Math.max(48,Math.min(88,base))}
function estimated倍率(u){let f=u.field+" "+u.faculties.join(" ");let m=2.1;if(u.type==="私立")m+=0.5;if(/医|薬|看護|医療|歯/.test(f))m+=0.4;if(/国際|外国語|心理/.test(f))m+=0.3;if(u.level>=60)m+=0.4;return Math.round(m*10)/10}
function currentRate(){let lv=levelNum();return Math.max(45,Math.min(82,Math.round(lv+5)))}
function gapText(u){let need=estimatedCommonTestRate(u),now=currentRate(),gap=need-now;if(gap<=0)return `<span class="gapGood">到達圏内</span><br><span class="small">目安 ${now}% / 必要 ${need}%</span>`;if(gap<=8)return `<span class="gapMid">あと${gap}%</span><br><span class="small">現在 ${now}% / 必要 ${need}%</span>`;return `<span class="gapBad">あと${gap}%</span><br><span class="small">現在 ${now}% / 必要 ${need}%</span>`}
function strategySortList(list){let mode=document.getElementById("compareSort")?document.getElementById("compareSort").value:"選択順";let arr=[...list];if(mode==="共テ得点率が低い順")arr.sort((a,b)=>estimatedCommonTestRate(a)-estimatedCommonTestRate(b));if(mode==="倍率が低い順")arr.sort((a,b)=>estimated倍率(a)-estimated倍率(b));if(mode==="就職安定度順")arr.sort((a,b)=>employmentScore(b)-employmentScore(a));if(mode==="偏差値が高い順")arr.sort((a,b)=>b.level-a.level);if(mode==="合格可能性順")arr.sort((a,b)=>(ratings(b).chance-ratings(a).chance));return arr}
function compareSortControl(){return `<div class="compareSortBox noPrint"><label>比較表の並び替え</label><select id="compareSort" onchange="renderCompare()">${["選択順","合格可能性順","共テ得点率が低い順","倍率が低い順","就職安定度順","偏差値が高い順"].map(x=>`<option value="${x}">${x}</option>`).join("")}</select><p class="small">共テ得点率・倍率は面談用の目安表示です。正式な数値は大学公式・入試情報サイトで確認してください。</p></div>`}
function compareRows(){let list=strategySortList(selected.map(getU).filter(Boolean));if(!list.length)return `<p class="help">まだ大学が選ばれていません。診断結果や検索から大学を追加してください。</p>`;let rows=["所在地","偏差値目安","合格可能性目安","昨年度共テ得点率目安","昨年度倍率目安","現在との差分","主な学部","大学との相性","入試の現実度","就職安定度","将来の広がり","大学生活タイプ","主な就職分野","受験科目"];return `<div class="compareHint"><span>📊 ${list.length}校を比較中</span><span>横スクロールできます →</span></div><div class="compareWrap"><table class="compareTable"><tr><th>項目</th>${list.map(u=>"<th>"+esc(u.name)+"</th>").join("")}</tr>${rows.map(row=>`<tr><th>${row}</th>${list.map(u=>{let r=ratings(u);if(row==="所在地")return "<td>"+esc(u.area)+"<br>"+esc(u.pref)+"</td>";if(row==="偏差値目安")return "<td><span class='levelBadge'>"+u.level+"前後</span></td>";if(row==="合格可能性目安")return "<td><span class='levelBadge'>"+admissionChance(u)+"%</span><br>"+chanceJudge(admissionChance(u))+"<br><span class='small'>面談用の目安</span></td>";if(row==="昨年度共テ得点率目安")return "<td><span class='levelBadge'>"+estimatedCommonTestRate(u)+"%前後</span><br><span class='small'>学部・方式で変動</span></td>";if(row==="昨年度倍率目安")return "<td><span class='levelBadge'>"+estimated倍率(u)+"倍前後</span><br><span class='small'>方式で変動</span></td>";if(row==="現在との差分")return "<td>"+gapText(u)+"</td>";if(row==="主な学部")return "<td>"+u.faculties.slice(0,6).map(esc).join("<br>")+"</td>";if(row==="大学との相性")return "<td class='stars'>"+stars(r.fit)+"</td>";if(row==="入試の現実度")return "<td class='stars'>"+stars(r.chance)+"</td>";if(row==="就職安定度")return "<td><span class='stars'>"+stars(employmentScore(u))+"</span><br>"+employmentLabel(u)+"<br><span class='small'>"+employmentReason(u)+"</span></td>";if(row==="将来の広がり")return "<td class='stars'>"+stars(r.future)+"</td>";if(row==="大学生活タイプ")return "<td>"+campusLifeTypeHtml(u)+"</td>";if(row==="主な就職分野")return "<td>"+careerImage(u).slice(0,4).map(esc).join("<br>")+"</td>";if(row==="受験科目")return "<td><a class='miniLink miniPrimary' target='_blank' href='"+manabiUrl(u.name)+"'>受験科目を見る</a><br><a class='miniLink miniGold' target='_blank' href='"+officialExamUrl(u.name)+"'>公式募集要項</a></td>";return "<td></td>"}).join("")}</tr>`).join("")}</table></div>`}
function classifyCandidate(u){let gap=estimatedCommonTestRate(u)-currentRate();if(gap>=12)return"チャレンジ";if(gap>=4)return"実力相応";return"安全・併願"}
function bestByType(list,type){let arr=list.filter(u=>classifyCandidate(u)===type);if(!arr.length)return null;return arr.sort((a,b)=>employmentScore(b)-employmentScore(a)||matchScore(b)-matchScore(a))[0]}
function aiAdviceHtml(){let list=selected.map(getU).filter(Boolean);if(!list.length){return `<div class="aiAdvice"><h3>🤖 AI進路アドバイス</h3><p class="help">大学を比較に追加すると、ここに受験戦略アドバイスが表示されます。</p></div>`}let sorted=[...list].sort((a,b)=>matchScore(b)-matchScore(a));let top=sorted[0];let challenge=bestByType(list,"チャレンジ");let match=bestByType(list,"実力相応");let safety=bestByType(list,"安全・併願");let field=answers.track||"未定";let now=currentRate();let avgNeed=Math.round(list.reduce((s,u)=>s+estimatedCommonTestRate(u),0)/list.length);let privateCount=list.filter(u=>u.type==="私立").length;let publicCount=list.length-privateCount;let areas=[...new Set(list.map(u=>u.area))].join("・");let strong=list.slice().sort((a,b)=>employmentScore(b)-employmentScore(a))[0];let summary=`現在の候補は「${areas}」を中心に、${field}系の進路を考えやすい組み合わせです。現在の共テ目安を${now}%前後とすると、候補全体の必要得点率目安は平均${avgNeed}%前後です。まずは${esc(top.name)}を軸に、チャレンジ校・実力相応校・安全校を分けて考えると面談で整理しやすくなります。`;let balance=[];if(challenge)balance.push(`第一志望・チャレンジ：${challenge.name}`);if(match)balance.push(`実力相応：${match.name}`);if(safety)balance.push(`安全校・併願：${safety.name}`);if(!balance.length)balance.push(`${top.name}を中心に、もう1〜2校追加して比較すると判断しやすくなります。`);let caution=[];if(privateCount===list.length)caution.push("候補が私立中心です。学費や受験日程の重なりも確認しましょう。");if(publicCount===list.length)caution.push("候補が国公立中心です。共通テストで必要な科目数が多くなるため、早めに科目確認が必要です。");if(list.length<3)caution.push("比較大学が少なめです。チャレンジ・実力相応・安全校を最低1校ずつ入れると受験戦略が立てやすくなります。");if(avgNeed-now>=10)caution.push("必要得点率との差が大きめです。まずは英語・数学・国語など配点の大きい科目を優先して伸ばしましょう。");if(!caution.length)caution.push("候補のバランスは比較的良好です。次は受験科目と入試日程を確認しましょう。");let todo=[];if(field==="教育")todo=["教員志望か、教育関連企業も含めるかを決める","英語・国語・小論文の基礎を固める","教育学部の面接・志望理由を早めに言語化する"];else if(field==="医療")todo=["必要な理科科目を早めに確定する","英語・数学・理科を優先して学習時間を増やす","医療職を目指す理由を面接で話せるようにする"];else if(field==="理系")todo=["数学の苦手単元を洗い出す","理科の選択科目を確定する","工学・情報・理学など学部の違いを比較する"];else if(field==="国際")todo=["英単語・長文読解を毎日固定する","英検など資格利用入試も確認する","留学制度や語学教育の違いを比較する"];else todo=["英語を最優先で安定させる","志望学部ごとの受験科目を確認する","安全校を1〜2校追加して受験日程を組む"];return `<div class="aiAdvice"><h3>🤖 AI進路アドバイス</h3><div class="adviceBlock"><h4>総評</h4><p>${esc(summary)}</p></div><div class="adviceBlock"><h4>おすすめ併願パターン</h4><ul>${balance.map(x=>`<li>${esc(x)}</li>`).join("")}</ul></div><div class="adviceBlock"><h4>生徒が今やること</h4><ul>${todo.map(x=>`<li>${esc(x)}</li>`).join("")}</ul></div><div class="adviceBlock"><h4>注意点</h4><ul>${caution.map(x=>`<li>${esc(x)}</li>`).join("")}</ul></div><div class="adviceBlock"><h4>就職面で見るなら</h4><p>${esc(strong.name)}は、候補内では就職安定度が高めです。理由：${esc(employmentReason(strong))}</p></div><div class="aiNote">このコメントは、選択した大学・分野・偏差値目安・共テ得点率目安・就職安定度から自動生成しています。</div></div>`}

function compareAddPanel(){
 return `<div class="addPanel noPrint">
   <button class="addToggle" onclick="toggleAddPanel()">＋ 大学を追加</button>
   <div id="addPanelBody" class="addBody">
     <div class="grid three">
       <div><label>エリア</label><select id="cmpArea" onchange="updateComparePrefOptions();updateCompareUniversityOptions()">
         ${["すべて",...areaOptions].map(a=>`<option value="${a}" ${a==="中部"?"selected":""}>${a}</option>`).join("")}
       </select></div>
       <div><label>都道府県</label><select id="cmpPref" onchange="updateCompareUniversityOptions()"></select></div>
       <div><label>大学</label><select id="cmpUniversity"></select></div>
     </div>
     <div class="actions">
       <button class="btn green" onclick="addCompareSelectedUniversity()">追加</button>
       <button class="btn primary" onclick="renderStrategy()">面談記録へ</button>
       <button class="btn gray" onclick="selected=[];renderCompare()">選択リセット</button>
     </div>
   </div>
   <div id="selectedChips" class="selectedChips">${selectedChipsHtml()}</div>
 </div>`;
}
function toggleAddPanel(){
 const body=document.getElementById("addPanelBody");
 if(!body)return;
 body.classList.toggle("open");
 if(body.classList.contains("open")){
   updateComparePrefOptions();
   updateCompareUniversityOptions();
 }
}
function selectedChipsHtml(){
 if(!selected.length)return `<span class="small">まだ比較大学が選ばれていません。</span>`;
 return selected.map(n=>`<span class="selectedChip">${esc(n)} <button onclick="removeSelected('${esc(n)}')">×</button></span>`).join("");
}
function removeSelected(name){
 selected=selected.filter(x=>x!==name);
 renderCompare();
}
function updateComparePrefOptions(){
 const areaSel=document.getElementById("cmpArea");
 const prefSel=document.getElementById("cmpPref");
 if(!areaSel||!prefSel)return;
 const area=areaSel.value;
 let prefs=[...new Set(universities.filter(u=>area==="すべて"||u.area===area).map(u=>u.pref))].sort();
 prefs=["すべて",...prefs];
 prefSel.innerHTML=prefs.map(p=>`<option value="${p}">${p}</option>`).join("");
}
function updateCompareUniversityOptions(){
 const areaSel=document.getElementById("cmpArea");
 const prefSel=document.getElementById("cmpPref");
 const uniSel=document.getElementById("cmpUniversity");
 if(!areaSel||!prefSel||!uniSel)return;
 const area=areaSel.value;
 const pref=prefSel.value||"すべて";
 let list=universities.filter(u=>(area==="すべて"||u.area===area)&&(pref==="すべて"||u.pref===pref));
 list=list.sort((a,b)=>b.level-a.level||a.name.localeCompare(b.name,"ja")).slice(0,200);
 if(!list.length){
   uniSel.innerHTML=`<option value="">候補なし</option>`;
   return;
 }
 uniSel.innerHTML=list.map(u=>`<option value="${esc(u.name)}">${esc(u.name)}｜${esc(u.type)}｜偏差値${u.level}前後</option>`).join("");
}
function addCompareSelectedUniversity(){
 const uniSel=document.getElementById("cmpUniversity");
 if(!uniSel||!uniSel.value)return;
 addSelected(uniSel.value);
 renderCompare();
 setTimeout(()=>{
   const body=document.getElementById("addPanelBody");
   if(body){
     body.classList.add("open");
     updateComparePrefOptions();
     updateCompareUniversityOptions();
   }
 },0);
}

function renderCompare(){$("app").innerHTML=`<div class="card"><h2>大学比較</h2><p>「＋大学を追加」から、エリア・都道府県・大学を選んで比較に追加できます。</p>${compareAddPanel()}<div class="box">${compareSortControl()}${compareRows()}</div>${aiAdviceHtml()}${sheetSaveBox()}</div>`}
function manualAdd(){let n=$("addName").value.trim();let u=universities.find(x=>x.name===n)||universities.find(x=>x.name.includes(n));if(!u)return alert("大学が見つかりません。正式名称に近い形で入力してください。");addSelected(u.name);renderCompare()}
function selectedCards(){let list=selected.map(getU).filter(Boolean);if(!list.length)return"<p class='help'>大学比較に追加した大学がここに表示されます。</p>";return list.map(u=>`<div class="box"><h3>${esc(u.name)}</h3><p class="small">${esc(u.area)}／${esc(u.pref)}／${esc(u.field)}</p>${chanceHtml(u)}<div class="hitBox">偏差値目安：${u.level}前後<br>昨年度共テ得点率目安：${estimatedCommonTestRate(u)}%前後<br>昨年度倍率目安：${estimated倍率(u)}倍前後<br>現在との差分：${gapText(u)}</div><h3>主な学部</h3>${facultyChips(u)}<div class="starGrid"><div class="starRow"><span>相性</span><span class="stars">${stars(ratings(u).fit)}</span></div><div class="starRow"><span>現実度</span><span class="stars">${stars(ratings(u).chance)}</span></div></div><div class="employBox">就職安定度：${stars(employmentScore(u))}　${employmentLabel(u)}<br>${employmentReason(u)}</div>${campusLifeTypeHtml(u)}<p><strong>主な就職分野</strong></p><ul>${careerImage(u).map(x=>"<li>"+esc(x)+"</li>").join("")}</ul><div class="actions"><a class="btn primary" target="_blank" href="${manabiUrl(u.name)}">受験科目</a><a class="btn gold" target="_blank" href="${careerUrl(u.name)}">就職実績</a></div></div>`).join("")}
function renderStrategy(){$("app").innerHTML=`<div class="card"><div class="printTitle">面談記録・進路戦略シート</div><h2>面談記録・進路戦略</h2><div class="grid three"><div><label>生徒名</label><input id="name" value="${esc(student.name)}"></div><div><label>高校名</label><input id="school" value="${esc(student.school)}"></div><div><label>学年</label><input id="grade" value="${esc(student.grade||answers.grade||"")}"></div><div><label>担当講師</label><input id="teacher" value="${esc(student.teacher)}"></div><div><label>面談日</label><input id="date" value="${esc(student.date||today())}"></div><div><label>志望メモ</label><input id="goal" value="${esc(student.goal)}"></div></div><div class="box"><h3>候補大学 比較表</h3>${compareRows()}</div>${aiAdviceHtml()}${sheetSaveBox()}<div class="grid two">${selectedCards()}</div><div class="grid two"><div class="box"><h3>面談メモ</h3><textarea id="memo">${esc(student.memo)}</textarea></div><div class="box"><h3>次回までの課題</h3><textarea id="action">${esc(student.action)}</textarea></div></div><div class="actions noPrint"><button class="btn primary" onclick="saveRecord()">保存</button><button class="btn navy" onclick="window.print()">印刷・PDF保存</button><button class="btn gray" onclick="renderCompare()">大学比較へ</button><button class="btn gray" onclick="renderHome()">ホーム</button></div></div>`;scrollTo(0,0)}
function getAdvicePlainText(){let list=selected.map(getU).filter(Boolean);if(!list.length)return"比較大学が未選択です。";let top=[...list].sort((a,b)=>matchScore(b)-matchScore(a))[0];let now=currentRate();let avgNeed=Math.round(list.reduce((s,u)=>s+estimatedCommonTestRate(u),0)/list.length);return `候補大学は${list.map(u=>u.name).join("、")}です。現在の共テ目安は${now}%前後、候補全体の必要得点率目安は平均${avgNeed}%前後です。${top.name}を軸に、チャレンジ・実力相応・安全校を分けて受験戦略を立てるとよいです。`}
function makeSheetPayload(){collect();let list=selected.map(getU).filter(Boolean);return{timestamp:new Date().toLocaleString("ja-JP"),studentName:student.name||"",school:student.school||"",grade:student.grade||answers.grade||"",teacher:student.teacher||"",interviewDate:student.date||"",residence:answers.residence||"",field:answers.track||"",level:answers.level||"",areas:(answers.areas||[]).join("・"),commute:answers.commute||"",kind:answers.kind||"",selectedUniversities:list.map(u=>u.name).join("、"),universityDetails:list.map(u=>`${u.name}｜${u.type}｜${u.area}｜${u.pref}｜偏差値${u.level}前後｜共テ${estimatedCommonTestRate(u)}%前後｜倍率${estimated倍率(u)}倍前後｜合格可能性目安${admissionChance(u)}%｜就職安定度${employmentLabel(u)}`).join("\n"),aiAdvice:getAdvicePlainText(),memo:student.memo||"",action:student.action||"",deepAverage:(typeof deepAverage==="function"?deepAverage():""),deepScores:answers.deepScores?JSON.stringify(answers.deepScores):"",deepField:answers.deepField||"",deepAdvice:(typeof deepAdviceText==="function"?deepAdviceText():""),pageUrl:location.href}}
function getSheetUrl(){return localStorage.getItem("sheet_webapp_url")||""}
function setSheetUrl(){const current=getSheetUrl();const url=prompt("Google Apps ScriptのWebアプリURLを入力してください",current);if(url!==null){localStorage.setItem("sheet_webapp_url",url.trim());alert("保存先URLを設定しました。")}}
async function sendToSheet(){const url=getSheetUrl();const status=document.getElementById("sheetStatus");if(!url){if(status)status.innerHTML='<span class="sheetNg">先に「保存先URLを設定」を押してください。</span>';return}const payload=makeSheetPayload();try{if(status)status.innerHTML='送信中...';await fetch(url,{method:"POST",mode:"no-cors",headers:{"Content-Type":"text/plain;charset=utf-8"},body:JSON.stringify(payload)});if(status)status.innerHTML='<span class="sheetOk">スプレッドシートへ送信しました。</span>'}catch(e){if(status)status.innerHTML='<span class="sheetNg">送信できませんでした。URLや公開設定を確認してください。</span>'}}
function sheetSaveBox(){return `<div class="sheetBox noPrint"><h3>📗 スプレッドシート保存</h3><p class="small">面談記録・比較大学・AIアドバイスをGoogleスプレッドシートに送信できます。初回だけ保存先URLを設定してください。</p><div class="actions"><button class="btn gray" onclick="setSheetUrl()">保存先URLを設定</button><button class="btn green" onclick="sendToSheet()">スプレッドシートに保存</button></div><div id="sheetStatus" class="sheetStatus"></div></div>`}
function saveRecord(){collect();let arr=JSON.parse(localStorage.getItem("univ_nav_records_v2")||"[]");arr.unshift({id:Date.now(),student,answers,selected,date:new Date().toISOString()});localStorage.setItem("univ_nav_records_v2",JSON.stringify(arr.slice(0,80)));alert("保存しました")}
renderHome();
</script>

<script>
window.addEventListener("load", function(){
  setTimeout(function(){
    var splash = document.getElementById("splashScreen");
    if(splash){ splash.classList.add("fade"); }
  }, 3200);
  setTimeout(function(){
    var splash = document.getElementById("splashScreen");
    if(splash){ splash.style.display = "none"; }
  }, 4200);
});
</script>
